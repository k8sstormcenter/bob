name: CI - bobctl lint & test

on:
  push:
    branches:
      - main
      - feat/crd
    paths:
      - 'pkg/**'
      - '.github/workflows/ci-bobctl-lint.yaml'
  pull_request:
    paths:
      - 'pkg/**'
      - '.github/workflows/ci-bobctl-lint.yaml'

permissions:
  contents: read

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo and private submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.ENTLEIN_PAT }}
          persist-credentials: false

      - name: Clone storage dependency
        run: |
          git clone --depth 1 --branch main https://github.com/k8sstormcenter/storage.git ../storage

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: pkg/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: pkg
          args: --timeout=5m

  test:
    name: unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo and private submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.ENTLEIN_PAT }}
          persist-credentials: false

      - name: Clone storage dependency
        run: |
          git clone --depth 1 --branch main https://github.com/k8sstormcenter/storage.git ../storage

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: pkg/go.sum

      - name: Run unit tests
        working-directory: pkg
        run: |
          set -o pipefail
          go test -race -count=1 -timeout 5m ./... 2>&1 | tee test-output.txt
          echo ""
          echo "=== Test Summary ==="
          grep -E '^(ok|FAIL|---) ' test-output.txt || true

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: pkg/test-output.txt
          if-no-files-found: ignore
