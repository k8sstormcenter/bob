name: CI - bobctl build

# Build on every push to main (for downstream CI that needs a bobctl binary)
# and on workflow_dispatch. Release ONLY on annotated v-prefixed tags (e.g.
# v0.0.1, v0.1.0-rc1). This avoids the rolling "latest" release which
# collided with GitHub's immutable-release attestations once the tag had
# been used — see .github/workflows/release-bobctl.yaml history for why.
#
# To cut a release:
#   git tag -a v0.0.X -m "bobctl v0.0.X"
#   git push origin v0.0.X
on:
  push:
    branches:
      - main
      - feat/plan
    paths:
      - 'pkg/**'
      - '.github/workflows/**'
    tags:
      - 'v*'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout repo and private submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.ENTLEIN_PAT}}

      # The go.mod replace directive: ../../storage relative to pkg/
      - name: Clone storage dependency
        run: |
          git clone --depth 1 --branch feature/collapse-config-crd https://github.com/k8sstormcenter/storage.git ../storage

      - name: Verify layout
        run: |
          echo "=== pkg/ ==="
          ls pkg/go.mod pkg/main.go
          echo "=== storage/ ==="
          ls ../storage/go.mod

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: pkg/go.sum

      - name: go vet
        working-directory: pkg
        run: go vet ./...

      - name: Determine version
        id: version
        run: |
          # On tag pushes, use the tag as the semver (strip leading v).
          # On branch pushes / workflow_dispatch, stamp the binary with a
          # dev pre-release string that includes the short SHA. These
          # binaries are uploaded as workflow artifacts only — never
          # published as a GitHub Release.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "version=0.0.0-dev+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bobctl
        working-directory: pkg
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ../bin/bobctl-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./main.go

      - name: Verify binary (native only)
        if: matrix.goarch == 'amd64'
        run: |
          bin/bobctl-${{ matrix.goos }}-${{ matrix.goarch }} --help
          bin/bobctl-${{ matrix.goos }}-${{ matrix.goarch }} tune --help
          bin/bobctl-${{ matrix.goos }}-${{ matrix.goarch }} collapse --help
          bin/bobctl-${{ matrix.goos }}-${{ matrix.goarch }} sign --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bobctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/bobctl-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Publish release
    needs: build
    # Release job only runs on semver tag pushes (v0.0.1, v0.1.0-rc1, ...).
    # For branch pushes the build job still produces artifacts — download
    # them from the workflow run directly instead of cutting a release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/bobctl-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
          done
          ls -lh release/

      - name: Determine release tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Pre-release when the tag has a suffix: -rc1, -alpha, -dev, etc.
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "title=bobctl $TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.tag.outputs.title }}" \
            --prerelease=${{ steps.tag.outputs.prerelease }} \
            --generate-notes \
            --target "${{ github.sha }}" \
            release/bobctl-*
