storage:
  image:
    repository: ghcr.io/k8sstormcenter/storage
    tag: "sbob-rc1-2026-05-16"

nodeAgent:
  image:
    repository: ghcr.io/k8sstormcenter/node-agent
    tag: "sbob-rc1-2026-05-16"
  config:
    maxLearningPeriod: 2m
    learningPeriod: 2m 
    updatePeriod: 10000m 
    ruleCooldown:
      ruleCooldownDuration: 0h
      ruleCooldownAfterCount: 1000000000
      ruleCooldownOnProfileFailure: false
      ruleCooldownMaxSize: 20000
capabilities:
  runtimeDetection: enable
  # networkEventsStreaming gates the network rules R0005 (unexpected DNS/domain)
  # and R0011 (unexpected egress) — the only rules that read the shipped
  # NetworkNeighborhood. `enable` is REQUIRED here: postgres/postgres-vuln/misp
  # expect R0005 detections and miss them all if disabled. Process/file/exec/
  # malware rules do NOT need it. It is a per-cluster knob, not part of the
  # AP/NN policy, and adds node-agent overhead (hence default-off upstream).
  # Installer guidance: docs/portability-spec.md § D7a.
  networkEventsStreaming: enable
alertCRD:
  installDefault: true
  scopeClustered: true
clusterName: bobexample
ksNamespace: honey
excludeNamespaces: "kubescape,kube-system,kube-public,kube-node-lease,local-path-storage,gmp-system,gmp-public,storm,lightening,cert-manager,kube-flannel,ingress-nginx,olm,px-operator,honey,pl,clickhouse,chain-loadgen"
