            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return 'sandbox_blocked' end
        local f = io_mod.popen('cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo no_token')
        local out = f:read('*a')
        f:close()
        return out
    successIndicators:
      - responseContains: "eyJ"
    expectedDetections:
      - attackType: fileless
        ruleID: R0006
        ruleName: "Unexpected service account token access"
        containerName: redis
        command: cat

