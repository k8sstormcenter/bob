# Benign baseline / "functional confusion" traffic for the dapr-shop demo — k6 edition.
#
# Lives in its OWN namespace (`shop-loadgen`) so node-agent's
# `excludeNamespaces` rule skips the client pods. Add `shop-loadgen` to
# excludeNamespaces in bob/kubescape/values.yaml. Same convention as
# example/chain/loadgen.yaml.
#
# Replaces the earlier curl-loop with a k6 model that behaves like a real
# shop's clients rather than N identical fixed-rate loops:
#   - PERSONAS: buyers (steady checkouts), browsers (mostly health/idle,
#     occasional checkout), and bursty users (clusters of checkouts).
#   - STOCHASTIC timing: exponential think-times, not a fixed period.
#   - VOLUME shape: VU count ramps up/down so concurrency fluctuates
#     (sessions effectively start and stop) instead of a constant 4.
#   - MULTIPLE SOURCES: several replicas -> a fan of client peers.
#
# Every request is HTTP into the apps' OWN endpoints, so the daprd
# sidecars perform the REAL building-block calls (service-invocation ->
# secret -> state -> pub/sub) on the apps' behalf, keeping the whole
# fabric continuously and *variably* busy.
#
# Scope: this drives only the existing legitimate endpoints, so it does
# NOT change the app or the shipped SBOBs. The busy fabric is the
# realistic background a workload generates, nothing more.
---
apiVersion: v1
kind: Namespace
metadata:
  name: shop-loadgen
  labels:
    kubescape.io/ignore: "true"
    app.kubernetes.io/part-of: dapr-shop-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-loadgen-k6
  namespace: shop-loadgen
  labels: {kubescape.io/ignore: "true"}
data:
  script.js: |
    import http from 'k6/http';
    import { sleep } from 'k6';

    const FE = __ENV.FE || 'http://frontend.shop.svc.cluster.local';
    const OR = __ENV.OR || 'http://orders.shop.svc.cluster.local';
    const PY = __ENV.PY || 'http://payments.shop.svc.cluster.local';

    export const options = {
      scenarios: {
        shoppers: {
          executor: 'ramping-vus',
          startVUs: 3,
          stages: [
            { duration: '3m', target: 10 },
            { duration: '5m', target: 18 },
            { duration: '4m', target: 6  },
            { duration: '5m', target: 14 },
            { duration: '3m', target: 4  },
            { duration: '6m', target: 12 },
          ],
          gracefulRampDown: '15s',
        },
      },
    };

    function think(mean) { sleep(Math.min(45, -Math.log(1 - Math.random()) * mean)); }
    function checkout() { http.post(FE + '/checkout', null, { headers: { 'Content-Type': 'application/json' } }); }
    function health() {
      const u = [FE, OR, PY][Math.floor(Math.random() * 3)];
      http.get(u + '/healthz');
    }

    // Persona assigned per-VU (stable for the VU's lifetime via the VU id).
    function persona() {
      const r = (__VU * 2654435761 >>> 0) % 100;   // deterministic per-VU, varied across VUs
      if (r < 55) return 'buyer';      // steady checkouts
      if (r < 85) return 'browser';    // mostly idle/health, occasional checkout
      return 'bursty';                 // clusters of checkouts
    }

    export default function () {
      const p = persona();
      if (p === 'buyer') {
        checkout();
        think(6);
      } else if (p === 'browser') {
        health();
        think(8);
        if (Math.random() < 0.25) checkout();
        think(10);
      } else { // bursty
        const n = 2 + Math.floor(Math.random() * 4);
        for (let i = 0; i < n; i++) { checkout(); sleep(0.2 + Math.random() * 0.6); }
        think(12);
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-loadgen
  namespace: shop-loadgen
  labels: {app: shop-loadgen, kubescape.io/ignore: "true"}
spec:
  replicas: 2   # multiple client source IPs
  selector: {matchLabels: {app: shop-loadgen}}
  template:
    metadata:
      labels: {app: shop-loadgen, kubescape.io/ignore: "true"}
    spec:
      containers:
        - name: k6
          image: grafana/k6:0.49.0
          args: ["run", "--quiet", "/scripts/script.js"]
          resources: {limits: {cpu: "300m", memory: "128Mi"}}
          volumeMounts: [{name: script, mountPath: /scripts}]
      volumes:
        - name: script
          configMap: {name: shop-loadgen-k6}
