# Dapr "shop" — a realistic CNCF Dapr microservice mesh for the blind detection exercise.
# frontend -> orders -> payments (+ a dormant 'admin'); each pod gets a daprd sidecar.
# Components: Redis (state/RESP), NATS JetStream (pub-sub), kubernetes secret store.
# Prereq: Dapr control plane installed (helm install dapr dapr/dapr -n dapr-system).
apiVersion: v1
kind: Namespace
metadata: {name: shop}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: redis, namespace: shop, labels: {app: redis}}
spec: {replicas: 1, selector: {matchLabels: {app: redis}}, template: {metadata: {labels: {app: redis}}, spec: {containers: [{name: redis, image: redis:7-alpine, resources: {limits: {cpu: "300m", memory: "128Mi"}}, ports: [{containerPort: 6379}]}]}}}
---
apiVersion: v1
kind: Service
metadata: {name: redis, namespace: shop}
spec: {selector: {app: redis}, ports: [{port: 6379, targetPort: 6379}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: nats, namespace: shop, labels: {app: nats}}
spec: {replicas: 1, selector: {matchLabels: {app: nats}}, template: {metadata: {labels: {app: nats}}, spec: {containers: [{name: nats, image: nats:2.10-alpine, args: ["-js"], resources: {limits: {cpu: "300m", memory: "128Mi"}}, ports: [{containerPort: 4222}]}]}}}
---
apiVersion: v1
kind: Service
metadata: {name: nats, namespace: shop}
spec: {selector: {app: nats}, ports: [{port: 4222, targetPort: 4222}]}
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata: {name: statestore, namespace: shop}
spec: {type: state.redis, version: v1, metadata: [{name: redisHost, value: "redis.shop.svc.cluster.local:6379"}, {name: redisPassword, value: ""}]}
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata: {name: orderpubsub, namespace: shop}
spec: {type: pubsub.jetstream, version: v1, metadata: [{name: natsURL, value: "nats://nats.shop.svc.cluster.local:4222"}, {name: name, value: "dapr-shop"}, {name: durableName, value: "shop-durable"}, {name: streamName, value: "shopstream"}]}
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata: {name: shopsecrets, namespace: shop}
spec: {type: secretstores.kubernetes, version: v1, metadata: [{name: defaultNamespace, value: "shop"}]}
---
apiVersion: v1
kind: Secret
metadata: {name: payment-key, namespace: shop}
stringData: {key: "pk_live_benign_baseline_only"}
---
apiVersion: v1
kind: Secret
metadata: {name: db-password, namespace: shop}
stringData: {password: "S3cr3t-postgres-pw"}
---
apiVersion: v1
kind: Secret
metadata: {name: jwt-signing-key, namespace: shop}
stringData: {key: "jwt-hs256-supersecret"}
---
apiVersion: v1
kind: Secret
metadata: {name: admin-token, namespace: shop}
stringData: {token: "admin-bearer-7f3a9c2e"}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: shop-app, namespace: shop}
binaryData: {server.js: }
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: frontend, namespace: shop, labels: {app: frontend}}
spec:
  replicas: 1
  selector: {matchLabels: {app: frontend}}
  template:
    metadata:
      labels: {app: frontend}
      annotations: {dapr.io/enabled: "true", dapr.io/app-id: "frontend", dapr.io/app-port: "3000", dapr.io/log-level: "info"}
    spec:
      containers:
      - name: app
        image: node:20-alpine
        command: ["node","/app/server.js"]
        env: [{name: ROLE, value: "frontend"}, {name: DAPR_HTTP_PORT, value: "3500"}]
        resources: {limits: {cpu: "300m", memory: "192Mi"}}
        ports: [{containerPort: 3000}]
        volumeMounts: [{name: code, mountPath: /app}]
      volumes: [{name: code, configMap: {name: shop-app}}]
---
apiVersion: v1
kind: Service
metadata: {name: frontend, namespace: shop}
spec: {selector: {app: frontend}, ports: [{port: 80, targetPort: 3000}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: orders, namespace: shop, labels: {app: orders}}
spec:
  replicas: 1
  selector: {matchLabels: {app: orders}}
  template:
    metadata:
      labels: {app: orders}
      annotations: {dapr.io/enabled: "true", dapr.io/app-id: "orders", dapr.io/app-port: "3000", dapr.io/log-level: "info"}
    spec:
      containers:
      - name: app
        image: node:20-alpine
        command: ["node","/app/server.js"]
        env: [{name: ROLE, value: "orders"}, {name: DAPR_HTTP_PORT, value: "3500"}]
        resources: {limits: {cpu: "300m", memory: "192Mi"}}
        ports: [{containerPort: 3000}]
        volumeMounts: [{name: code, mountPath: /app}]
      volumes: [{name: code, configMap: {name: shop-app}}]
---
apiVersion: v1
kind: Service
metadata: {name: orders, namespace: shop}
spec: {selector: {app: orders}, ports: [{port: 80, targetPort: 3000}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: payments, namespace: shop, labels: {app: payments}}
spec:
  replicas: 1
  selector: {matchLabels: {app: payments}}
  template:
    metadata:
      labels: {app: payments}
      annotations: {dapr.io/enabled: "true", dapr.io/app-id: "payments", dapr.io/app-port: "3000", dapr.io/log-level: "info"}
    spec:
      containers:
      - name: app
        image: node:20-alpine
        command: ["node","/app/server.js"]
        env: [{name: ROLE, value: "payments"}, {name: DAPR_HTTP_PORT, value: "3500"}]
        resources: {limits: {cpu: "300m", memory: "192Mi"}}
        ports: [{containerPort: 3000}]
        volumeMounts: [{name: code, mountPath: /app}]
      volumes: [{name: code, configMap: {name: shop-app}}]
---
apiVersion: v1
kind: Service
metadata: {name: payments, namespace: shop}
spec: {selector: {app: payments}, ports: [{port: 80, targetPort: 3000}]}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: admin, namespace: shop, labels: {app: admin}}
spec:
  replicas: 1
  selector: {matchLabels: {app: admin}}
  template:
    metadata:
      labels: {app: admin}
      annotations: {dapr.io/enabled: "true", dapr.io/app-id: "admin", dapr.io/app-port: "3000", dapr.io/log-level: "info"}
    spec:
      containers:
      - name: app
        image: node:20-alpine
        command: ["node","/app/server.js"]
        env: [{name: ROLE, value: "admin"}, {name: DAPR_HTTP_PORT, value: "3500"}]
        resources: {limits: {cpu: "300m", memory: "192Mi"}}
        ports: [{containerPort: 3000}]
        volumeMounts: [{name: code, mountPath: /app}]
      volumes: [{name: code, configMap: {name: shop-app}}]
---
apiVersion: v1
kind: Service
metadata: {name: admin, namespace: shop}
spec: {selector: {app: admin}, ports: [{port: 80, targetPort: 3000}]}
# Benign baseline traffic is generated by loadgen.yaml — a richer,
# concurrent, jittered driver in its own excluded `shop-loadgen`
# namespace. Apply it alongside this manifest during learning.
