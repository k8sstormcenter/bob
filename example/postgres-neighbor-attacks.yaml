apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: postgres-neighbor-attacks
  description: >-
    Neighbor pod attack suite for postgres namespace. Uses the existing
    pg-client pod as the attacker (it already has psql and network access
    to the PG cluster). Tests SA token theft, K8s API enumeration, DNS
    exfil, and lateral probing from the database client pod.
target:
  service: pg-client
  namespace: postgres
  port: 5432

attacks:
  # T1552.001 — Credentials in Files: SA token
  - name: neighbor-sa-token
    type: cmdinject
    exec:
      command: ["cat", "/var/run/secrets/kubernetes.io/serviceaccount/token"]
    expectedDetections:
      - ruleID: R0006
        ruleName: Unexpected service account token access
        containerName: pg-client
        command: cat

  # T1552.001 — Credentials in Files: /etc/shadow
  - name: neighbor-etc-shadow
    type: cmdinject
    exec:
      command: ["cat", "/etc/shadow"]
    expectedDetections:
      - ruleID: R0010
        ruleName: Unexpected Sensitive File Access
        containerName: pg-client
        command: cat

  # T1036 — Masquerading: drifted binary
  - name: neighbor-drifted
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/ls /tmp/drifted_neighbor && /tmp/drifted_neighbor / && rm -f /tmp/drifted_neighbor"]
    expectedDetections:
      - ruleID: R1001
        ruleName: Drifted process executed
        containerName: pg-client

  # T1059.004 — Exec from /dev/shm
  - name: neighbor-devshm
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/echo /dev/shm/mal_neighbor && chmod +x /dev/shm/mal_neighbor && /dev/shm/mal_neighbor pwned && rm -f /dev/shm/mal_neighbor"]
    expectedDetections:
      - ruleID: R1000
        ruleName: Process executed from malicious source
        containerName: pg-client

  # T1046 — Network Service Discovery: DNS recon
  - name: neighbor-dns-recon
    type: cmdinject
    exec:
      command: ["sh", "-c", "getent hosts evil.attacker.example.com || echo dns_done"]
    expectedDetections:
      - ruleID: R0005
        ruleName: DNS Anomalies in container
        containerName: pg-client

  # T1613 — Container and Resource Discovery: K8s API
  - name: neighbor-k8s-api
    type: cmdinject
    exec:
      command: ["sh", "-c", "TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token) && curl -sk -H \"Authorization: Bearer $TOKEN\" https://kubernetes.default.svc/api/v1/namespaces/postgres/pods 2>&1 | head -10 || echo k8s_failed"]
    expectedDetections:
      - ruleID: R0005
        ruleName: DNS Anomalies in container
        containerName: pg-client
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: curl

  # T1082 — System Information Discovery: /proc/environ
  - name: neighbor-proc-environ
    type: cmdinject
    exec:
      command: ["cat", "/proc/1/environ"]
    expectedDetections:
      - ruleID: R0008
        ruleName: Read Environment Variables from procfs
        containerName: pg-client
        command: cat

  # T1046 — Network Service Discovery: probe PG cluster
  - name: neighbor-app-probe
    type: cmdinject
    exec:
      command: ["sh", "-c", "psql -h pg-rw -U app -d app -tAc 'SELECT version();' 2>&1 | head -3"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: pg-client
        command: psql
