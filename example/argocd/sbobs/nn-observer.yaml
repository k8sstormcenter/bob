##
## NetworkNeighborhood for the negative-control observer (argocd demo).
## Polls argocd-server + kube-dns only.
##
apiVersion: spdx.softwarecomposition.kubescape.io/v1beta1
kind: NetworkNeighborhood
metadata:
  name: observer
  namespace: argocd
  annotations:
    kubescape.io/completion: complete
    kubescape.io/status: completed
    kubescape.io/managed-by: User
  labels:
    kubescape.io/workload-api-group: apps
    kubescape.io/workload-api-version: v1
    kubescape.io/workload-kind: Deployment
    kubescape.io/workload-name: observer
    kubescape.io/workload-namespace: argocd
spec:
  matchLabels:
    app: observer
  containers:
    - name: observer
      ingress: []
      egress:
        - identifier: egress-kube-dns
          ipAddress: ""
          dns: ""
          dnsNames: null
          ports:
            - name: UDP-53
              port: 53
              protocol: UDP
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
          type: internal
        - identifier: egress-argocd-server
          ipAddress: ""
          dns: ""
          dnsNames: null
          ports:
            - name: TCP-8080
              port: 8080
              protocol: TCP
          podSelector:
            matchLabels:
              app: argocd-server
          namespaceSelector: null
          type: internal
  initContainers: []
  ephemeralContainers: []
