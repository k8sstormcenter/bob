apiVersion: spdx.softwarecomposition.kubescape.io/v1beta1
kind: ApplicationProfile
metadata:
  annotations:
    kubescape.io/completion: complete
    kubescape.io/status: completed
    kubescape.io/managed-by: User
  labels:
    kubescape.io/workload-api-group: apps
    kubescape.io/workload-api-version: v1
    kubescape.io/workload-kind: Deployment
    kubescape.io/workload-name: chain-redis
    kubescape.io/workload-namespace: chain
  name: chain-redis
  namespace: chain
spec:
  architectures:
  - amd64
  containers:
  - capabilities:
    - CAP_DAC_OVERRIDE
    - CAP_DAC_READ_SEARCH
    - CAP_NET_ADMIN
    endpoints: null
    execs:
    - args:
      - /usr/local/bin/redis-server
      - /etc/redis/redis.conf
      path: /usr/local/bin/redis-server
    identifiedCallStacks: null
    imageID: ghcr.io/k8sstormcenter/redis-vulnerable@sha256:aec7a0c5713a190ed4e02b30a9f066cb1d7137531d8c3bca21c2781ca8a7d945
    imageTag: ghcr.io/k8sstormcenter/redis-vulnerable:7.2.10
    name: redis
    opens:
    - flags:
      - O_RDONLY
      path: /dev/urandom
    - flags:
      - O_RDONLY
      path: /dump.rdb
    - flags:
      - O_RDONLY
      - O_CLOEXEC
      path: /etc/ld.so.cache
    - flags:
      - O_RDONLY
      # k8s ConfigMap symlink target — `..YYYY_MM_DD_HH_MM_SS.SECS`
      # tempdir, changes on every ConfigMap remount. Whole-segment
      # wildcard.
      path: /etc/redis/⋯/redis.conf
    - flags:
      - O_RDONLY
      path: /proc/⋯/net/core/somaxconn
    - flags:
      - O_RDONLY
      path: /proc/⋯/stat
    - flags:
      - O_RDONLY
      - O_DIRECTORY
      - O_CLOEXEC
      path: /proc/⋯/task/1/fd
    - flags:
      - O_RDONLY
      path: /proc/⋯/vm/overcommit_memory
    - flags:
      - O_RDONLY
      path: /sys/devices/system/clocksource/clocksource0/current_clocksource
    - flags:
      - O_RDONLY
      path: /sys/kernel/mm/transparent_hugepage/enabled
    - flags:
      - O_CLOEXEC
      - O_RDONLY
      path: /usr/lib/x86_64-linux-gnu/libc.so.6
    - flags:
      - O_RDONLY
      - O_CLOEXEC
      path: /usr/lib/x86_64-linux-gnu/libm.so.6
    - flags:
      - O_RDONLY
      - O_CLOEXEC
      path: /usr/share/zoneinfo/Etc/UTC
    rulePolicies: {}
    seccompProfile:
      spec:
        defaultAction: ''
    syscalls:
    - clone3
    - epoll_create
    - listen
    - rseq
