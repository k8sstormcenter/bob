##
## gitserver — the GitOps source Argo CD syncs from (ns: gitops).
## Serves two repos over git:// on :9418 (base-path /repos):
##   gitops.git     the legitimate react Application source (Argo CD syncs this)
##   malrender.git  source a planted Application can point at
## Self-contained: no external git host needed; the react2shell scenario
## resolves its source in-cluster.
##
apiVersion: v1
kind: Namespace
metadata:
  name: gitops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitserver
  namespace: gitops
  labels: {app: gitserver}
spec:
  replicas: 1
  selector: {matchLabels: {app: gitserver}}
  template:
    metadata:
      labels: {app: gitserver}
    spec:
      containers:
      - name: gitserver
        image: alpine/git:latest
        resources: {limits: {cpu: "500m", memory: "256Mi"}}
        ports: [{containerPort: 9418}]
        command: ["sh","-c"]
        args:
        - |
          set -e
          apk add --no-cache git-daemon >/dev/null 2>&1 || apk add --no-cache git-daemon
          mkdir -p /repos
          mkdir -p /w1 && cd /w1 && git init -q && git config user.email a@b.c && git config user.name a
          echo '' | base64 -d > react.yaml
          git add -A && git commit -qm react
          git clone -q --bare /w1 /repos/gitops.git && (cd /repos/gitops.git && git update-server-info && touch git-daemon-export-ok)
          mkdir -p /w2 && cd /w2 && git init -q && git config user.email a@b.c && git config user.name a
          printf 'generators:\n- malgen.yaml\n' > kustomization.yaml
          printf 'apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: malgen\n  annotations:\n    config.kubernetes.io/function: |\n      exec:\n        path: ./mal.sh\n' > malgen.yaml
          echo '' | base64 -d > mal.sh && chmod +x mal.sh
          git add -A && git commit -qm mal
          git clone -q --bare /w2 /repos/malrender.git && (cd /repos/malrender.git && git update-server-info && touch git-daemon-export-ok)
          echo "serving gitops.git + malrender.git :9418"
          exec git daemon --reuseaddr --export-all --base-path=/repos --verbose /repos
          
---
apiVersion: v1
kind: Service
metadata:
  name: gitserver
  namespace: gitops
spec:
  selector: {app: gitserver}
  ports: [{port: 9418, targetPort: 9418}]
