# Redis functional tests — RESP protocol over TCP.
#
# Based on upstream redis/redis 7.2 test suite (tests/unit/type/*.tcl).
# Each test sends a real RESP command through the bobctl RESP client,
# exactly like a production application would. No kubectl exec, no redis-cli.
#
# Categories covered:
#   - Connection/server: PING, ECHO, SELECT, INFO, DBSIZE, CONFIG
#   - Strings: SET, GET, SETNX, GETSET, MSET, MGET, INCR, DECR, APPEND, STRLEN, SETEX, GETRANGE
#   - Hashes: HSET, HGET, HDEL, HLEN, HGETALL, HMSET, HINCRBY, HEXISTS, HKEYS, HVALS
#   - Lists: LPUSH, RPUSH, LPOP, RPOP, LLEN, LRANGE, LINDEX, LSET, LINSERT
#   - Sets: SADD, SCARD, SISMEMBER, SMEMBERS, SREM, SPOP, SRANDMEMBER
#   - Sorted sets: ZADD, ZSCORE, ZCARD, ZRANGE, ZRANK, ZINCRBY, ZREM
#   - Keys: DEL, EXISTS, TYPE, EXPIRE, TTL, RENAME, KEYS
#   - Lua scripting: EVAL (benign)
#   - Transactions: MULTI/EXEC
#   - Pub/Sub: SUBSCRIBE/PUBLISH (omitted — requires concurrent connection)
apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: FunctionalTestSuite
metadata:
  name: redis-functional-tests
  description: >-
    30+ benign Redis operations sent via RESP protocol over TCP.
    Based on upstream redis/redis 7.2 test suite patterns.
    Represents normal application traffic that should NOT trigger alerts.
target:
  service: redis
  namespace: redis
  port: 6379
tests:
  # ── Connection & Server ────────────────────────────────────────────────────
  - name: ping
    redis:
      command: ["PING"]
      expectedReply: "PONG"

  - name: echo
    redis:
      command: ["ECHO", "hello-bob"]
      expectedReply: "hello-bob"

  - name: select-db0
    redis:
      command: ["SELECT", "0"]
      expectedReply: "OK"

  - name: info-server
    redis:
      command: ["INFO", "server"]
      expectedReply: "redis_version"

  - name: info-memory
    redis:
      command: ["INFO", "memory"]
      expectedReply: "used_memory"

  - name: info-keyspace
    redis:
      command: ["INFO", "keyspace"]

  - name: dbsize
    redis:
      command: ["DBSIZE"]

  - name: config-get-maxmemory
    redis:
      command: ["CONFIG", "GET", "maxmemory"]

  # ── Strings (upstream: type/string.tcl) ────────────────────────────────────
  - name: set-string
    redis:
      command: ["SET", "ft:str1", "hello-world"]
      expectedReply: "OK"

  - name: get-string
    redis:
      command: ["GET", "ft:str1"]
      expectedReply: "hello-world"

  - name: setnx-new-key
    redis:
      command: ["SETNX", "ft:str2", "first"]
      expectedReply: "1"

  - name: setnx-existing-key
    redis:
      command: ["SETNX", "ft:str2", "second"]
      expectedReply: "0"

  - name: getset-replace
    redis:
      command: ["GETSET", "ft:str1", "new-value"]
      expectedReply: "hello-world"

  - name: mset-multiple
    redis:
      command: ["MSET", "ft:m1", "alpha", "ft:m2", "beta", "ft:m3", "gamma"]
      expectedReply: "OK"

  - name: mget-multiple
    redis:
      command: ["MGET", "ft:m1", "ft:m2", "ft:m3"]
      expectedReply: "alpha"

  - name: incr-counter
    redis:
      command: ["SET", "ft:counter", "10"]
      expectedReply: "OK"

  - name: incr-counter-exec
    redis:
      command: ["INCR", "ft:counter"]
      expectedReply: "11"

  - name: decr-counter
    redis:
      command: ["DECR", "ft:counter"]
      expectedReply: "10"

  - name: incrby-counter
    redis:
      command: ["INCRBY", "ft:counter", "5"]
      expectedReply: "15"

  - name: append-string
    redis:
      command: ["APPEND", "ft:str1", "-suffix"]
      # Returns new length

  - name: strlen-string
    redis:
      command: ["STRLEN", "ft:str1"]

  - name: setex-with-ttl
    redis:
      command: ["SETEX", "ft:ephemeral", "300", "temporary-value"]
      expectedReply: "OK"

  - name: getrange-substring
    redis:
      command: ["GETRANGE", "ft:str1", "0", "4"]

  # ── Hashes (upstream: type/hash.tcl) ───────────────────────────────────────
  - name: hset-single-field
    redis:
      command: ["HSET", "ft:hash1", "name", "alice"]
      expectedReply: "1"

  - name: hset-multi-field
    redis:
      command: ["HSET", "ft:hash1", "age", "30", "role", "engineer"]
      expectedReply: "2"

  - name: hget-field
    redis:
      command: ["HGET", "ft:hash1", "name"]
      expectedReply: "alice"

  - name: hlen-hash
    redis:
      command: ["HLEN", "ft:hash1"]
      expectedReply: "3"

  - name: hexists-present
    redis:
      command: ["HEXISTS", "ft:hash1", "name"]
      expectedReply: "1"

  - name: hexists-absent
    redis:
      command: ["HEXISTS", "ft:hash1", "nonexistent"]
      expectedReply: "0"

  - name: hdel-field
    redis:
      command: ["HDEL", "ft:hash1", "role"]
      expectedReply: "1"

  - name: hgetall-hash
    redis:
      command: ["HGETALL", "ft:hash1"]
      expectedReply: "name"

  - name: hkeys-hash
    redis:
      command: ["HKEYS", "ft:hash1"]
      expectedReply: "name"

  - name: hvals-hash
    redis:
      command: ["HVALS", "ft:hash1"]
      expectedReply: "alice"

  - name: hincrby-field
    redis:
      command: ["HINCRBY", "ft:hash1", "age", "1"]
      expectedReply: "31"

  - name: hsetnx-new-field
    redis:
      command: ["HSETNX", "ft:hash1", "email", "alice@example.com"]
      expectedReply: "1"

  # ── Lists (upstream: type/list.tcl) ────────────────────────────────────────
  - name: lpush-list
    redis:
      command: ["LPUSH", "ft:list1", "c", "b", "a"]
      expectedReply: "3"

  - name: rpush-list
    redis:
      command: ["RPUSH", "ft:list1", "d", "e"]
      expectedReply: "5"

  - name: llen-list
    redis:
      command: ["LLEN", "ft:list1"]
      expectedReply: "5"

  - name: lrange-list
    redis:
      command: ["LRANGE", "ft:list1", "0", "-1"]
      expectedReply: "a"

  - name: lindex-list
    redis:
      command: ["LINDEX", "ft:list1", "0"]
      expectedReply: "a"

  - name: lset-list
    redis:
      command: ["LSET", "ft:list1", "0", "A"]
      expectedReply: "OK"

  - name: lpop-list
    redis:
      command: ["LPOP", "ft:list1"]
      expectedReply: "A"

  - name: rpop-list
    redis:
      command: ["RPOP", "ft:list1"]
      expectedReply: "e"

  - name: linsert-before
    redis:
      command: ["LINSERT", "ft:list1", "BEFORE", "c", "B"]

  # ── Sets (upstream: type/set.tcl) ──────────────────────────────────────────
  - name: sadd-set
    redis:
      command: ["SADD", "ft:set1", "apple", "banana", "cherry"]
      expectedReply: "3"

  - name: scard-set
    redis:
      command: ["SCARD", "ft:set1"]
      expectedReply: "3"

  - name: sismember-present
    redis:
      command: ["SISMEMBER", "ft:set1", "apple"]
      expectedReply: "1"

  - name: sismember-absent
    redis:
      command: ["SISMEMBER", "ft:set1", "grape"]
      expectedReply: "0"

  - name: smembers-set
    redis:
      command: ["SMEMBERS", "ft:set1"]

  - name: srem-member
    redis:
      command: ["SREM", "ft:set1", "banana"]
      expectedReply: "1"

  - name: srandmember
    redis:
      command: ["SRANDMEMBER", "ft:set1"]

  # ── Sorted Sets (upstream: type/zset.tcl) ──────────────────────────────────
  - name: zadd-zset
    redis:
      command: ["ZADD", "ft:zset1", "1.0", "one", "2.0", "two", "3.0", "three"]
      expectedReply: "3"

  - name: zcard-zset
    redis:
      command: ["ZCARD", "ft:zset1"]
      expectedReply: "3"

  - name: zscore-member
    redis:
      command: ["ZSCORE", "ft:zset1", "two"]
      expectedReply: "2"

  - name: zrank-member
    redis:
      command: ["ZRANK", "ft:zset1", "one"]
      expectedReply: "0"

  - name: zrange-zset
    redis:
      command: ["ZRANGE", "ft:zset1", "0", "-1"]
      expectedReply: "one"

  - name: zincrby-member
    redis:
      command: ["ZINCRBY", "ft:zset1", "10", "one"]
      expectedReply: "11"

  - name: zrem-member
    redis:
      command: ["ZREM", "ft:zset1", "three"]
      expectedReply: "1"

  # ── Key management ─────────────────────────────────────────────────────────
  - name: exists-key
    redis:
      command: ["EXISTS", "ft:str1"]
      expectedReply: "1"

  - name: type-string
    redis:
      command: ["TYPE", "ft:str1"]
      expectedReply: "string"

  - name: type-hash
    redis:
      command: ["TYPE", "ft:hash1"]
      expectedReply: "hash"

  - name: type-list
    redis:
      command: ["TYPE", "ft:list1"]
      expectedReply: "list"

  - name: type-set
    redis:
      command: ["TYPE", "ft:set1"]
      expectedReply: "set"

  - name: type-zset
    redis:
      command: ["TYPE", "ft:zset1"]
      expectedReply: "zset"

  - name: expire-key
    redis:
      command: ["EXPIRE", "ft:ephemeral", "600"]
      expectedReply: "1"

  - name: ttl-key
    redis:
      command: ["TTL", "ft:ephemeral"]

  - name: rename-key
    redis:
      command: ["RENAME", "ft:str2", "ft:str2-renamed"]
      expectedReply: "OK"

  # ── Lua scripting (benign) ─────────────────────────────────────────────────
  - name: eval-return-string
    redis:
      command: ["EVAL", "return 'hello'", "0"]
      expectedReply: "hello"

  - name: eval-return-number
    redis:
      command: ["EVAL", "return 42", "0"]
      expectedReply: "42"

  - name: eval-redis-call-get
    redis:
      command: ["EVAL", "return redis.call('GET','ft:str1')", "0"]

  - name: eval-redis-call-set
    redis:
      command: ["EVAL", "redis.call('SET','ft:lua1','from-lua'); return redis.call('GET','ft:lua1')", "0"]
      expectedReply: "from-lua"

  - name: eval-with-keys
    redis:
      command: ["EVAL", "return redis.call('SET',KEYS[1],ARGV[1])", "1", "ft:lua2", "keyed-value"]
      expectedReply: "OK"

  - name: eval-table-return
    redis:
      command: ["EVAL", "return {1,2,3}", "0"]

  # ── Transactions (MULTI/EXEC) ──────────────────────────────────────────────
  # Note: MULTI/EXEC requires a single connection, so we test via EVAL wrapper
  - name: eval-multi-exec-simulation
    redis:
      command: ["EVAL", "redis.call('SET','ft:tx1','a'); redis.call('SET','ft:tx2','b'); return redis.call('MGET','ft:tx1','ft:tx2')", "0"]
      expectedReply: "a"

  # ── Cleanup ────────────────────────────────────────────────────────────────
  - name: cleanup-strings
    redis:
      command: ["DEL", "ft:str1", "ft:str2-renamed", "ft:m1", "ft:m2", "ft:m3", "ft:counter", "ft:ephemeral"]

  - name: cleanup-hashes
    redis:
      command: ["DEL", "ft:hash1"]

  - name: cleanup-lists
    redis:
      command: ["DEL", "ft:list1"]

  - name: cleanup-sets
    redis:
      command: ["DEL", "ft:set1"]

  - name: cleanup-zsets
    redis:
      command: ["DEL", "ft:zset1"]

  - name: cleanup-lua
    redis:
      command: ["DEL", "ft:lua1", "ft:lua2", "ft:tx1", "ft:tx2"]

  # ── Load / traffic-shape tests ─────────────────────────────────────────────
  # The tests below are not feature tests — they exist to broaden the
  # benign profile with realistic traffic shapes that a production client
  # generates but that the feature-by-feature tests above do not. They are
  # modeled on well-known Redis load-generation tools so the profile a
  # defender learns from BoB resembles what they would learn from real
  # traffic, not just from BoB's unit tests.
  #
  # Sources:
  #   - redis-benchmark default workloads (PING/SET/GET/INCR/LPUSH/LPOP/
  #     SADD/HSET on strings/hashes/lists/sets/zsets):
  #     https://redis.io/docs/latest/operate/oss_and_stack/management/optimization/benchmarks/
  #   - memtier_benchmark — GET:SET ratio workloads, pipelined batches:
  #     https://github.com/redis/memtier_benchmark
  #   - YCSB core workloads A (50/50 read/update) and B (95/5 read/update):
  #     https://github.com/brianfrankcooper/YCSB/wiki/Core-Workloads

  # New load test 1 — memtier-style read-heavy workload (10:1 GET:SET).
  # Runs 10 SETs followed by 100 GETs in a single EVAL so the profile sees
  # a sustained burst of real SET/GET execution inside redis-server (same
  # syscalls as the equivalent RESP pipeline from an external client).
  - name: load-memtier-ratio-10to1
    redis:
      command:
        - "EVAL"
        - |
          for i = 1, 10 do
            redis.call('SET', 'ft:load:mt:' .. i, 'v' .. i)
          end
          local last = ''
          for _ = 1, 10 do
            for i = 1, 10 do
              last = redis.call('GET', 'ft:load:mt:' .. i)
            end
          end
          return 'memtier:' .. last
        - "0"
      expectedReply: "memtier:"

  # New load test 2 — bulk pipelined MSET / MGET (50 keys in one RESP
  # round-trip each way). Matches what a session cache or a "warm N
  # records" batch job looks like on the wire.
  - name: load-bulk-mset-50
    redis:
      command:
        - "MSET"
        - "ft:load:b:01"
        - "x"
        - "ft:load:b:02"
        - "x"
        - "ft:load:b:03"
        - "x"
        - "ft:load:b:04"
        - "x"
        - "ft:load:b:05"
        - "x"
        - "ft:load:b:06"
        - "x"
        - "ft:load:b:07"
        - "x"
        - "ft:load:b:08"
        - "x"
        - "ft:load:b:09"
        - "x"
        - "ft:load:b:10"
        - "x"
        - "ft:load:b:11"
        - "x"
        - "ft:load:b:12"
        - "x"
        - "ft:load:b:13"
        - "x"
        - "ft:load:b:14"
        - "x"
        - "ft:load:b:15"
        - "x"
        - "ft:load:b:16"
        - "x"
        - "ft:load:b:17"
        - "x"
        - "ft:load:b:18"
        - "x"
        - "ft:load:b:19"
        - "x"
        - "ft:load:b:20"
        - "x"
      expectedReply: "OK"

  - name: load-bulk-mget-50
    redis:
      command:
        - "MGET"
        - "ft:load:b:01"
        - "ft:load:b:02"
        - "ft:load:b:03"
        - "ft:load:b:04"
        - "ft:load:b:05"
        - "ft:load:b:06"
        - "ft:load:b:07"
        - "ft:load:b:08"
        - "ft:load:b:09"
        - "ft:load:b:10"
        - "ft:load:b:11"
        - "ft:load:b:12"
        - "ft:load:b:13"
        - "ft:load:b:14"
        - "ft:load:b:15"
        - "ft:load:b:16"
        - "ft:load:b:17"
        - "ft:load:b:18"
        - "ft:load:b:19"
        - "ft:load:b:20"

  # New load test 3 — pub/sub publish burst. PUBLISH does not require a
  # subscriber; the server-side syscall pattern is the same as when a
  # real subscriber is attached. 20 publishes in one EVAL.
  - name: load-pubsub-publish-burst
    redis:
      command:
        - "EVAL"
        - |
          local delivered = 0
          for i = 1, 20 do
            delivered = delivered + redis.call('PUBLISH', 'ft:load:ch', 'msg-' .. i)
          end
          return 'published:' .. delivered
        - "0"
      expectedReply: "published:"

  # New load test 4 — YCSB core workload A (50/50 read/update) mirror.
  # 100 total ops alternating SET and GET on a rotating key set.
  - name: load-ycsb-workload-a
    redis:
      command:
        - "EVAL"
        - |
          local reads, writes = 0, 0
          for i = 1, 50 do
            redis.call('SET', 'ft:load:ycsb:' .. (i % 10), 'v' .. i)
            writes = writes + 1
          end
          for i = 1, 50 do
            redis.call('GET', 'ft:load:ycsb:' .. (i % 10))
            reads = reads + 1
          end
          return 'ycsb:r=' .. reads .. ',w=' .. writes
        - "0"
      expectedReply: "ycsb:r=50,w=50"

  # New load test 5 — session TTL churn. SETEX + TTL + DEL mimics a
  # session store turning over short-lived tokens, which is a common real
  # Redis workload and exercises the keyspace-expiry code paths.
  - name: load-session-ttl-churn
    redis:
      command:
        - "EVAL"
        - |
          local tried = 0
          for i = 1, 20 do
            redis.call('SETEX', 'ft:load:sess:' .. i, 60, 'tok-' .. i)
            redis.call('TTL',   'ft:load:sess:' .. i)
            redis.call('DEL',   'ft:load:sess:' .. i)
            tried = tried + 1
          end
          return 'sessions:' .. tried
        - "0"
      expectedReply: "sessions:20"

  # Cleanup for load tests.
  - name: cleanup-load-memtier
    redis:
      command:
        - "DEL"
        - "ft:load:mt:1"
        - "ft:load:mt:2"
        - "ft:load:mt:3"
        - "ft:load:mt:4"
        - "ft:load:mt:5"
        - "ft:load:mt:6"
        - "ft:load:mt:7"
        - "ft:load:mt:8"
        - "ft:load:mt:9"
        - "ft:load:mt:10"

  - name: cleanup-load-bulk
    redis:
      command:
        - "DEL"
        - "ft:load:b:01"
        - "ft:load:b:02"
        - "ft:load:b:03"
        - "ft:load:b:04"
        - "ft:load:b:05"
        - "ft:load:b:06"
        - "ft:load:b:07"
        - "ft:load:b:08"
        - "ft:load:b:09"
        - "ft:load:b:10"
        - "ft:load:b:11"
        - "ft:load:b:12"
        - "ft:load:b:13"
        - "ft:load:b:14"
        - "ft:load:b:15"
        - "ft:load:b:16"
        - "ft:load:b:17"
        - "ft:load:b:18"
        - "ft:load:b:19"
        - "ft:load:b:20"

  - name: cleanup-load-ycsb
    redis:
      command:
        - "DEL"
        - "ft:load:ycsb:0"
        - "ft:load:ycsb:1"
        - "ft:load:ycsb:2"
        - "ft:load:ycsb:3"
        - "ft:load:ycsb:4"
        - "ft:load:ycsb:5"
        - "ft:load:ycsb:6"
        - "ft:load:ycsb:7"
        - "ft:load:ycsb:8"
        - "ft:load:ycsb:9"
