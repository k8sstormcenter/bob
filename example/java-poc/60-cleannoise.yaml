apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cleannoise
  name: cleannoise
  namespace: java-poc
spec:
  progressDeadlineSeconds: 600
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: cleannoise
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: cleannoise
        kubescape.io/user-defined-network: cleannoise
        kubescape.io/user-defined-profile: cleannoise
    spec:
      containers:
        - command:
            - sh
            - -c
            - while true; do wget -qO- http://'frontend.java-poc.svc.cluster.local:8080'/api/products?q=noise >/dev/null 2>&1; wget -qO- http://'frontend.java-poc.svc.cluster.local:8080'/ >/dev/null 2>&1; sleep 0.3; done
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          name: busybox
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
