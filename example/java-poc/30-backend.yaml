apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    scenario: A
  name: backend
  namespace: java-poc
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: backend
        kubescape.io/user-defined-network: backend
        kubescape.io/user-defined-profile: backend
        scenario: A
    spec:
      containers:
        - env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: appdb
            - name: POSTGRES_USER
              value: postgres
            - name: JAVA_TOOL_OPTIONS
              value: -Dnetworkaddress.cache.negative.ttl=0 -Dnetworkaddress.cache.ttl=5
          image: ghcr.io/k8sstormcenter/log4j-chain-backend-vulnerable@sha256:72655e5a5523f578f99544ba7514aeb067f219d09811ea77235dba8bcb6cefb5
          imagePullPolicy: IfNotPresent
          name: backend
          ports:
            - containerPort: 8080
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: java-poc
spec:
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: backend
  type: ClusterIP
