apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    scenario: A
  name: backend
  namespace: java-poc
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: backend
        kubescape.io/user-defined-network: backend
        kubescape.io/user-defined-profile: backend
        scenario: A
    spec:
      containers:
        - env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: appdb
            - name: POSTGRES_USER
              value: postgres
            # JNDI/_probe call-out target — pathogen-ns for the java-poc naming
            # (the log4shell disease itself is driven by the malicious User-Agent).
            - name: LDAP_HOST
              value: pathogen.pathogen-ns.svc.cluster.local
            - name: JAVA_TOOL_OPTIONS
              value: -Dnetworkaddress.cache.negative.ttl=0 -Dnetworkaddress.cache.ttl=5
          # #151 product-API backend: real backend->postgres pg-wire on /api/products
          # (the stub 72655e returned {"products":[]} and never opened a pg connection).
          image: ghcr.io/k8sstormcenter/log4j-chain-backend-vulnerable@sha256:689e1c1b29083b43845302f59e7f1706b7a0bf1ed825395ae4421fda957afcfd
          imagePullPolicy: IfNotPresent
          name: backend
          ports:
            - containerPort: 8080
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: java-poc
spec:
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: backend
  type: ClusterIP
