apiVersion: v1
data:
  seed.sql: |
    CREATE TABLE users (
        id SERIAL PRIMARY KEY,
        email TEXT,
        full_name TEXT,
        created_at TIMESTAMP DEFAULT NOW()
    );
    INSERT INTO users (email, full_name) VALUES
        ('alice@example.com', 'Alice Anderson'),
        ('bob@example.com',   'Bob Brown'),
        ('carol@example.com', 'Carol Carter');
kind: ConfigMap
metadata:
  name: pg-seed
  namespace: java-poc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: java-poc
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: postgres
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: postgres
        kubescape.io/user-defined-network: postgres
        kubescape.io/user-defined-profile: postgres
    spec:
      containers:
        - env:
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
            - name: POSTGRES_DB
              value: appdb
          image: postgres:16
          imagePullPolicy: IfNotPresent
          name: postgres
          ports:
            - containerPort: 5432
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /docker-entrypoint-initdb.d
              name: seed
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            name: pg-seed
          name: seed
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: java-poc
spec:
  ports:
    - port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    app: postgres
  type: ClusterIP
