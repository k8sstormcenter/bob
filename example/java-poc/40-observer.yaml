apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    role: observer
  name: observer
  namespace: java-poc
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: observer
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: observer
        kubescape.io/user-defined-network: observer
        kubescape.io/user-defined-profile: observer
        role: observer
    spec:
      containers:
        - command:
            - /bin/sh
            - -c
            - |
              while true; do
                curl -sf http://backend:8080/api/products \
                  -H 'User-Agent: observer/1.0' \
                  -o /dev/null || true
                sleep 30
              done
          image: curlimages/curl:8.6.0
          imagePullPolicy: IfNotPresent
          name: observer
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: observer
  namespace: java-poc
spec:
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: observer
  type: ClusterIP
