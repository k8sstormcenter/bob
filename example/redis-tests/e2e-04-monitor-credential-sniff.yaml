apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-e2e-04-monitor-credential-sniff
  description: >-
    E2E breach scenario 4 (bonus) — "Passive MONITOR credential sniffing
    from a compromised neighbor pod". Premise: attacker is on the pod
    network, has RESP reach to unauthenticated Redis, wants every AUTH
    token, session ID, and write that passes over the wire without
    touching the dataset itself. Single RESP command — MONITOR — and
    then a listen loop.

    Why it matters for detection: MONITOR is a developer/ops-only command
    that applications never issue. The benign profile should not contain
    it, so a single invocation is a clean drift signal. On the network
    side, the client connection becomes long-lived and receives bursty
    traffic mirroring real client activity — a behavior shape distinct
    from a normal request/reply app pod.

    Chained with a second connection that issues decoy credential-bearing
    commands (fake AUTH, HSET with a token-shaped value) so the MONITOR
    stream actually has something interesting to capture — realistic for a
    CI run where there is no production traffic to sniff.

    Reference: hackviser.com Redis pentesting notes on MONITOR for
    information disclosure
    https://hackviser.com/tactics/pentesting/services/redis
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis

attacks:
  # Decoy traffic first — ensure MONITOR has something to sniff.
  # AUTH against an unauthenticated server returns an error but the
  # cleartext password is still visible in MONITOR output until the
  # server rejects it.
  - name: sniff-decoy-auth
    type: custom
    redis:
      command: ["AUTH", "pretend-production-password"]

  - name: sniff-decoy-session-write
    type: custom
    redis:
      command:
        - "HSET"
        - "session:decoy"
        - "token"
        - "Bearer-eyJhbGciOiJIUzI1NiJ9.decoy.for-monitor-sniff"

  # MONITOR itself — one RESP command that should never appear in a
  # production application's command set.
  - name: sniff-monitor-start
    type: custom
    redis:
      command: ["MONITOR"]

  # CLIENT LIST is a natural follow-up (enumerate who else is connected
  # before starting to sniff) and is similarly out of profile.
  - name: sniff-client-list
    type: custom
    redis:
      command: ["CLIENT", "LIST"]

  # Cleanup decoy
  - name: sniff-cleanup
    type: custom
    redis:
      command: ["DEL", "session:decoy"]

expectedDetections:
  - attackType: custom
    ruleID: R0003
    ruleName: "Syscalls Anomalies in container"
    containerName: redis
