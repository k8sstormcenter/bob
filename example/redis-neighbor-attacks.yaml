apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: redis-neighbor-attacks
  description: >-
    Neighbor pod attack suite for redis namespace. Simulates attacks from
    the redis-client pod (already exists in the redis namespace) as a
    compromised application with network access to the Redis service.
target:
  service: redis-client
  namespace: redis
  port: 6379

attacks:
  # T1552.001 — Credentials in Files: SA token
  - name: neighbor-sa-token
    type: cmdinject
    exec:
      command: ["cat", "/var/run/secrets/kubernetes.io/serviceaccount/token"]
    expectedDetections:
      - ruleID: R0006
        ruleName: Unexpected Service Account Token Access
        containerName: redis-client
        command: cat

  # T1552.001 — Credentials in Files: /etc/shadow
  - name: neighbor-etc-shadow
    type: cmdinject
    exec:
      command: ["cat", "/etc/shadow"]
    expectedDetections:
      - ruleID: R0010
        ruleName: Unexpected Sensitive File Access
        containerName: redis-client
        command: cat

  # T1036 — Masquerading: drifted binary
  - name: neighbor-drifted
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/ls /tmp/drifted_neighbor && /tmp/drifted_neighbor / && rm -f /tmp/drifted_neighbor"]
    expectedDetections:
      - ruleID: R1001
        ruleName: Exec Binary Not In Base Image
        containerName: redis-client

  # T1059.004 — Exec from /dev/shm
  - name: neighbor-devshm
    type: cmdinject
    exec:
      command: ["sh", "-c", "cp /bin/echo /dev/shm/mal_neighbor && chmod +x /dev/shm/mal_neighbor && /dev/shm/mal_neighbor pwned && rm -f /dev/shm/mal_neighbor"]
    expectedDetections:
      - ruleID: R1000
        ruleName: Exec from malicious source
        containerName: redis-client

  # T1046 — Network Service Discovery: DNS recon
  - name: neighbor-dns-recon
    type: cmdinject
    exec:
      command: ["sh", "-c", "getent hosts evil.attacker.example.com || echo dns_done"]
    expectedDetections:
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: redis-client

  # T1613 — Container and Resource Discovery: K8s API
  - name: neighbor-k8s-api
    type: cmdinject
    exec:
      command: ["sh", "-c", "TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token) && curl -sk -H \"Authorization: Bearer $TOKEN\" https://kubernetes.default.svc/api/v1/namespaces/redis/pods 2>&1 | head -10 || echo k8s_failed"]
    # cat opens the SA token (R0006); R0005 fires on the curl DNS lookup;
    # R0001 fires on cat AND curl as unexpected processes for redis-client.
    expectedDetections:
      - ruleID: R0006
        ruleName: Unexpected Service Account Token Access
        containerName: redis-client
        command: cat
      - ruleID: R0005
        ruleName: Unexpected domain request
        containerName: redis-client
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis-client
        command: curl

  # T1082 — System Information Discovery: /proc/environ
  - name: neighbor-proc-environ
    type: cmdinject
    exec:
      command: ["cat", "/proc/1/environ"]
    expectedDetections:
      - ruleID: R0008
        ruleName: Read Environment Variables from procfs
        containerName: redis-client
        command: cat

  # T1046 — Network Service Discovery: probe Redis directly
  - name: neighbor-app-probe
    type: cmdinject
    exec:
      command: ["sh", "-c", "echo 'PING' | nc redis.redis.svc.cluster.local 6379 2>&1 || echo probe_done"]
    expectedDetections:
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: redis-client
        command: nc
