# Minimal frontend: nginx reverse-proxy in front of chain-backend.
# Forwards User-Agent + body unchanged. Same image in all 3 scenarios.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-conf
  namespace: log4j-poc
data:
  default.conf: |
    server {
        listen 8080;
        location / {
            proxy_pass http://chain-backend:8080;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chain-frontend
  namespace: log4j-poc
spec:
  replicas: 1
  selector: { matchLabels: { app: chain-frontend } }
  template:
    metadata:
      labels: { app: chain-frontend }
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports: [{ containerPort: 8080 }]
        volumeMounts:
        - { name: conf, mountPath: /etc/nginx/conf.d }
      volumes:
      - name: conf
        configMap: { name: frontend-conf }
---
apiVersion: v1
kind: Service
metadata:
  name: chain-frontend
  namespace: log4j-poc
spec:
  type: NodePort
  selector: { app: chain-frontend }
  ports: [{ port: 8080, targetPort: 8080, nodePort: 30080 }]
