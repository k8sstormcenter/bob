  - name: cleanup-recreate-bobtest
    type: sqli
    exec:
      # PR119 rabbit: previous version was non-idempotent. If a run aborted
      # before cve-impact-drop-table, bobtest already existed and this
      # block appended a fresh ('restored', 'after-attack') row every run.
      # That made later COPY/exfil steps non-deterministic. Now we
      # explicitly DROP+CREATE so the table starts empty every time, then
      # insert the single baseline row.
      command: ["psql", "-tAc",
                "DROP TABLE IF EXISTS bobtest; CREATE TABLE bobtest (id SERIAL PRIMARY KEY, key TEXT NOT NULL, value TEXT, created_at TIMESTAMPTZ DEFAULT NOW()); INSERT INTO bobtest (key, value) VALUES ('restored', 'after-attack');"]
    expectedDetections: []
